<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM SF Projetos Elétricos</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.3/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
:root{--bg:#f0f2f5;--bg2:#fff;--bg3:#f8f9fa;--text:#1a1a2e;--text2:#555;--side:#1a2332;--side-txt:#c8d0dc;--side-hover:#2a3a52;--borda:#e0e0e0;--primaria:#2563eb;--sucesso:#16a34a;--perigo:#dc2626;--aviso:#f59e0b;--input-bg:#fff;--input-border:#d1d5db;--header-bg:#1a2332;--header-txt:#fff}
.dark{--bg:#0f1724;--bg2:#1a2332;--bg3:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--side:#0d1321;--side-txt:#94a3b8;--side-hover:#1e293b;--borda:#2d3a4e;--primaria:#3b82f6;--sucesso:#22c55e;--perigo:#ef4444;--aviso:#fbbf24;--input-bg:#1e293b;--input-border:#334155;--header-bg:#0d1321;--header-txt:#e2e8f0}
body{background:var(--bg);color:var(--text);min-height:100vh}
#telaLogin{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f1724,#1a2332)}
.login-box{background:#1a2332;padding:36px;border-radius:14px;width:360px}
.login-box h1{color:#fff;font-size:22px;margin-bottom:4px}
.login-box .sub{color:#94a3b8;font-size:13px;margin-bottom:24px}
.login-box label{color:#c8d0dc;font-size:13px;display:block;margin-bottom:4px}
.login-box input{width:100%;padding:10px 12px;border:1px solid #334155;border-radius:6px;background:#0d1321;color:#fff;font-size:14px;margin-bottom:14px;outline:none}
.login-box input:focus{border-color:#2563eb}
.login-box button{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600}
.login-box .remember{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.login-box .remember input{width:auto;margin:0}
.login-box .remember label{color:#94a3b8;margin:0;font-size:13px}
.login-erro{color:#ef4444;font-size:13px;margin-top:8px;display:none}
#app{display:none}
.topo{background:var(--header-bg);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100}
.topo-esq{display:flex;align-items:center;gap:10px}
.topo-esq .logo{background:#2563eb;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.topo-esq h2{color:var(--header-txt);font-size:15px;font-weight:600}
.topo-dir{display:flex;align-items:center;gap:8px}
.topo-btn{background:none;border:1px solid var(--borda);color:var(--header-txt);cursor:pointer;font-size:13px;padding:5px 12px;border-radius:5px}
.layout{display:flex;padding-top:52px;min-height:100vh}
.sidebar{width:200px;background:var(--side);padding:10px 0;position:fixed;top:52px;left:0;bottom:0;overflow-y:auto;z-index:50}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 18px;color:var(--side-txt);cursor:pointer;font-size:13px;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--side-hover);color:#fff}
.sidebar-item.ativo{background:var(--side-hover);color:#fff;border-left-color:var(--primaria);font-weight:600}
.conteudo{flex:1;margin-left:200px;padding:20px;min-height:calc(100vh - 52px)}
.titulo-pag{font-size:22px;font-weight:700;margin-bottom:16px;color:var(--text)}
.cartoes{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.cartao{background:var(--bg2);border-radius:10px;padding:16px;border:1px solid var(--borda);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cartao .rotulo{font-size:11px;color:var(--text2);text-transform:uppercase;font-weight:600}
.cartao .valor{font-size:24px;font-weight:700;color:var(--text);margin-top:4px}
.cartao .sub{font-size:12px;color:var(--text2);margin-top:2px}
.grafico-card{background:var(--bg2);border-radius:10px;padding:16px;border:1px solid var(--borda);margin-bottom:16px}
canvas{max-height:280px}
.linha-graficos{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.barra-abas{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.barra-abas button{padding:6px 14px;border:1px solid var(--borda);border-radius:6px;background:var(--bg3);color:var(--text2);cursor:pointer;font-size:12px;font-weight:500}
.barra-abas button.ativo{background:var(--primaria);color:#fff;border-color:var(--primaria)}
.sub-barra{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.sub-barra button{padding:4px 12px;border:1px solid var(--borda);border-radius:5px;background:transparent;color:var(--text2);cursor:pointer;font-size:11px}
.sub-barra button.ativo{background:var(--primaria);color:#fff;border-color:var(--primaria)}
.tabela-wrap{overflow-x:auto;background:var(--bg2);border-radius:10px;border:1px solid var(--borda);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--bg3)}
th{padding:9px 12px;text-align:left;font-weight:600;color:var(--text);border-bottom:2px solid var(--borda);font-size:11px;text-transform:uppercase}
td{padding:8px 12px;border-bottom:1px solid var(--borda);color:var(--text);vertical-align:middle}
tr:hover td{background:var(--bg3)}
.edita-input,.edita-select{padding:4px 6px;border:1px solid var(--input-border);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:13px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary{background:var(--primaria);color:#fff}
.btn-success{background:var(--sucesso);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--borda);color:var(--text)}
.btn-icone{background:none;border:none;cursor:pointer;font-size:15px;padding:3px 5px;color:var(--text2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.grupo{display:flex;flex-direction:column;gap:3px}
.grupo label{font-size:12px;color:var(--text2);font-weight:500}
.grupo input,.grupo select{padding:8px 10px;border:1px solid var(--input-border);border-radius:5px;background:var(--input-bg);color:var(--text);font-size:14px;outline:none}
.orc-tema{--bg:#0f1724;--bg2:#1a2332;--bg3:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--border:#2d3a4e;--input-bg:#1a2332;--input-border:#334155}
.orc-tema .cartao{background:#1a2332;border-color:#334155}
.orc-tema input,.orc-tema select{background:#1a2332;border-color:#334155;color:#e2e8f0}
.orc-nav{display:flex;gap:4px;margin-bottom:14px;background:var(--bg3);padding:4px;border-radius:8px}
.orc-nav span{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);font-weight:500}
.orc-nav span.ativo{background:var(--primaria);color:#fff}
.estq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.estq-item{background:var(--bg2);border:1px solid var(--borda);border-radius:8px;padding:14px}
.estq-item .nome{font-weight:600;font-size:14px;color:var(--text)}
.estq-item .info{font-size:12px;color:var(--text2);margin-top:3px}
.estq-item .qtd{font-size:20px;font-weight:700;margin-top:4px}
.estq-item .qtd.ok{color:var(--sucesso)}
.estq-item .qtd.baixo{color:var(--aviso)}
.estq-item .qtd.critico{color:var(--perigo)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:14px;padding:24px;width:540px;max-width:95%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:14px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:14px}
.flut-direita{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2)}
.checkbox-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.checkbox-grid label{font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text)}
.proj-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.proj-card{background:var(--bg2);border-radius:10px;padding:16px;border:1px solid var(--borda);box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s,box-shadow .15s}
.proj-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.proj-card-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px}
.proj-card-titulo{font-weight:700;font-size:15px;color:var(--text)}
.proj-card-badge{font-size:11px;padding:3px 8px;border-radius:12px;font-weight:600;white-space:nowrap}
.proj-card-badge.pago{background:rgba(22,163,74,.15);color:var(--sucesso)}
.proj-card-badge.aberto{background:rgba(245,158,11,.15);color:var(--aviso)}
.proj-card-info{font-size:12px;color:var(--text2);margin-bottom:6px}
.proj-card-valor{font-size:20px;font-weight:700;color:var(--text)}
.proj-card-sub{font-size:12px;color:var(--text2);margin-top:2px}
.proj-card-anexos{font-size:11px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--borda)}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.conteudo{margin-left:0;padding:14px}.cartoes{grid-template-columns:1fr 1fr}.linha-graficos{grid-template-columns:1fr}.form-grid,.form-grid-3,.form-grid-4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="telaLogin">
<div class="login-box">
<div style="background:#2563eb;color:#fff;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin-bottom:10px">SF</div>
<h1>CRM SF</h1>
<p class="sub">Instalações Fotovoltaicas</p>
<label>Usuário</label><input type="text" id="loginUser">
<label>Senha</label><input type="password" id="loginPass" onkeydown="if(event.key=='Enter')logar()">

<div id="app">
<div class="topo"><div class="topo-esq"><div class="logo">SF</div><h2>CRM SF Projetos Elétricos</h2></div><div class="topo-dir"><span id="userInfo" style="color:var(--header-txt);font-size:12px;margin-right:8px"></span><button class="topo-btn" onclick="altTema()" id="btnTema">🌙</button><button class="topo-btn" onclick="sair()">Sair</button></div></div>

<div class="grupo" style="grid-column:1/3"><label>Obs</label><input id="fLeadObs"></div></div>
<button class="btn btn-primary" onclick="salvarLeadModal()">Salvar</button></div></div>
<div class="modal-overlay" id="modalGasto"><div class="modal">
<button class="flut-direita" onclick="fecharModalGasto()">✕</button><h2>Nova Venda</h2><p id="infoGasto"></p>
<div class="form-grid"><div class="grupo"><label>Valor</label><input id="gastoValor"></div><div class="grupo"><label>Gasto</label><input id="gastoGasto"></div><div class="grupo"><label>Empresa</label><select id="gastoEmpresa"><option>SF</option><option>SPAZZIO</option><option>BRANCO</option><option>ÉTHOS</option><option>SOLAR FORCE</option><option>TAQUARI</option></select></div><div class="grupo"><label>Potência</label><input id="gastoPotencia"></div></div>
<button class="btn btn-success" onclick="confirmarVenda()">Confirmar</button></div></div>
<div class="modal-overlay" id="modalEstoque"><div class="modal">
<button class="flut-direita" onclick="fecharModalEstoque()">✕</button><h2 id="tituloEstoque">Novo Item</h2>
<div class="form-grid">
<div class="grupo"><label>Item</label><input id="estqItem"></div><div class="grupo"><label>Tipo</label><input id="estqTipo"></div>
<div class="grupo"><label>Marca</label><input id="estqMarca"></div><div class="grupo"><label>Un</label><select id="estqUn"><option>un</option><option>metro</option><option>kg</option><option>par</option></select></div>

<div class="modal-overlay" id="modalPDF"><div class="modal">

<div class="grupo"><label>Data fim</label><input id="pdfDtFim" placeholder="dd/mm/aaaa"></div></div>
<p style="font-size:13px;color:var(--text2)">Campos:</p>

<label><input type="checkbox" id="pcCliente" checked>Cliente</label>
<label><input type="checkbox" id="pcEmpresa" checked>Empresa</label>
<label><input type="checkbox" id="pcData" checked>Data</label>
<label><input type="checkbox" id="pcValor" checked>Valor</label>
<label><input type="checkbox" id="pcTRT" checked>TRT</label>
<label><input type="checkbox" id="pcPago" checked>Pago</label></div>
<button class="btn btn-success" onclick="gerarPDF()">Gerar PDF</button></div></div>
<div class="modal-overlay" id="modalProjeto"><div class="modal" style="width:640px">
<button class="flut-direita" onclick="fecharModalProj()">✕</button>

<div class="form-grid-3">
<div class="grupo"><label>Cliente *</label><input id="mpCliente"></div>
<div class="grupo"><label>Empresa</label><input id="mpEmpresa" list="mpList"><datalist id="mpList"></datalist></div>
<div class="grupo"><label>Data</label><input id="mpData"></div>
<div class="grupo"><label>Valor (R$)</label><input id="mpValor"></div>
<div class="grupo"><label>TRT (R$)</label><input id="mpTrt"></div>

<input type="file" id="mpFotoInput" multiple accept="image/*" style="font-size:12px;margin-bottom:8px;width:100%">

</div>
<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">

<button class="btn btn-outline" onclick="limparModalProj()">🆕 Limpar</button>

</div>
<div id="mpMsg" style="margin-top:6px;color:var(--sucesso);font-size:13px"></div>
</div></div>
<script>
var sb=supabase.createClient('https://zzcenbzqlzibrqnjooia.supabase.co','sb_publishable_mH9pJzsKhc2g0qwp2AW8PQ_8hrT-cW1');
var ORC_ITENS=[],ORC_HIST=[],ultimoGrafico=null,abaToggle='leads',subLead='status',subProj='empresa';
var idxVender=null,idxEditLead=null,idEditEstq=null,usuarioAtual=null;
var cache={};
var projDocs=[],projFotos=[],idxEditProjModal=null;
function fmtNum(v){return(Number(v)||0).toFixed(2).replace('.',',')}
function parseMon(s){if(!s)return 0;return parseFloat(String(s).replace(/[R$\s.]/g,'').replace(',','.'))||0}
function hoje(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()}
function meses(){return['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']}
function altTema(){document.body.classList.toggle('dark');document.getElementById('btnTema').textContent=document.body.classList.contains('dark')?'☀️':'🌙';localStorage.setItem('tema',document.body.classList.contains('dark')?'dark':'light')}
async function get(t){try{if(cache[t])return cache[t];const{data}=await sb.from(t).select('*').order('id',{ascending:false});cache[t]=data||[];return cache[t]}catch(e){return[]}}
async function ins(t,d){try{cache[t]=null;const{data}=await sb.from(t).insert(d).select();return data}catch(e){console.error(e);return null}}
async function upd(t,i,d){try{cache[t]=null;await sb.from(t).update(d).eq('id',i);return true}catch(e){return false}}
async function del(t,i){try{cache[t]=null;await sb.from(t).delete().eq('id',i);return true}catch(e){return false}}
// Limpa cache de todas as tabelas relacionadas
function limparCache(){cache={}}
function montarSidebar(){
  var mapa={Administrador:['dashboard','leads','vendas','gastos','projetos','orcamentos','estoque','config'],Financeiro:['dashboard','leads','vendas','gastos','projetos','orcamentos','estoque'],Vendedor:['dashboard','leads','orcamentos'],Empresa:['dashboard','projetos']};
  var rotulos={dashboard:'📊 Dashboard',leads:'👥 Leads',vendas:'💰 Vendas',gastos:'🧾 Gastos',projetos:'🔬 Projetos',orcamentos:'📋 Orçamentos',estoque:'📦 Estoque',config:'⚙️ Config'};
  var paginas=mapa[usuarioAtual.funcao]||['dashboard'];
  var s=document.getElementById('sidebar');s.innerHTML='';
  for(var i=0;i<paginas.length;i++){
    var d=document.createElement('div');d.className='sidebar-item'+(i===0?' ativo':'');d.dataset.page=paginas[i];
    d.innerHTML='<span>'+rotulos[paginas[i]]+'</span>';
    d.onclick=function(p){return function(){ir(p)}}(paginas[i]);
    s.appendChild(d);
  }
}
async function logar(){
  var u=document.getElementById('loginUser').value.trim();
  var p=document.getElementById('loginPass').value.trim();
  if(!u||!p){document.getElementById('loginErro').textContent='Preencha os campos';document.getElementById('loginErro').style.display='block';return}
  try{
    var {data}=await sb.from('usuarios').select('*').eq('usuario',u).eq('senha',p).maybeSingle();
    if(data){
      usuarioAtual=data;
      document.getElementById('telaLogin').style.display='none';
      document.getElementById('app').style.display='block';
      document.getElementById('loginErro').style.display='none';
      document.getElementById('userInfo').textContent=data.funcao+(data.empresa?' - '+data.empresa:'');
      if(document.getElementById('rememberMe').checked)localStorage.setItem('crm_user',JSON.stringify({user:u,pass:p}));

function gerarPDF(){
  var dados=window._P||[];
  var emp=document.getElementById('pdfEmpresa')?document.getElementById('pdfEmpresa').value:'',pg=document.getElementById('pdfPago')?document.getElementById('pdfPago').value:'';
  var di=document.getElementById('pdfDtIni')?document.getElementById('pdfDtIni').value:'',df=document.getElementById('pdfDtFim')?document.getElementById('pdfDtFim').value:'';
  if(emp)dados=dados.filter(function(p){return p.empresa==emp});
  if(pg)dados=dados.filter(function(p){return p.pago==pg});
  if(di){var a=di.split('/');if(a.length==3)dados=dados.filter(function(p){if(!p.data)return true;var b=p.data.split('/');return b.length==3?new Date(a[2],a[1]-1,a[0])<=new Date(b[2],b[1]-1,b[0]):true})}
  if(df){var a=df.split('/');if(a.length==3)dados=dados.filter(function(p){if(!p.data)return true;var b=p.data.split('/');return b.length==3?new Date(a[2],a[1]-1,a[0])>=new Date(b[2],b[1]-1,b[0]):true})}
  if(!dados.length){alert('Nenhum projeto encontrado');return}
  try{
    var doc=new jspdf.jsPDF();doc.setFontSize(16);doc.text('SF Projetos Elétricos',14,22);doc.setFontSize(12);doc.text('Relatório de Projetos',14,32);doc.setFontSize(10);doc.text('Gerado: '+hoje(),14,40);
    doc.text('Filtro: '+(emp||'Todas')+(di||df?' | '+(di||'??')+' a '+(df||''):''),14,48);
    var cab=[];if(document.getElementById('pcCliente').checked)cab.push('Cliente');if(document.getElementById('pcEmpresa').checked)cab.push('Empresa');if(document.getElementById('pcData').checked)cab.push('Data');if(document.getElementById('pcValor').checked)cab.push('Valor');if(document.getElementById('pcTRT').checked)cab.push('TRT');if(document.getElementById('pcPago').checked)cab.push('Pago');
    var corpo=[];dados.forEach(function(p){var linha=[];if(document.getElementById('pcCliente').checked)linha.push(p.cliente);if(document.getElementById('pcEmpresa').checked)linha.push(p.empresa||'');if(document.getElementById('pcData').checked)linha.push(p.data||'');if(document.getElementById('pcValor').checked)linha.push('R$ '+fmtNum(parseMon(p.valor)));if(document.getElementById('pcTRT').checked)linha.push('R$ '+fmtNum(parseMon(p.trt)));if(document.getElementById('pcPago').checked)linha.push(p.pago=='SIM'?'Sim':'Não');corpo.push(linha)});
    doc.autoTable({startY:56,head:[cab],body:corpo,theme:'striped',headStyles:{fillColor:[37,99,235]}});
    var total=dados.reduce(function(s,p){return s+parseMon(p.valor)},0),tr=dados.reduce(function(s,p){return s+parseMon(p.trt)},0),y=doc.lastAutoTable.finalY+10;
    doc.setFontSize(10);doc.text('Total: '+dados.length+' projetos',14,y);doc.text('Valor: R$ '+fmtNum(total),14,y+8);doc.text('TRT: R$ '+fmtNum(tr),14,y+16);
    doc.save('projetos_'+(emp||'todos')+'.pdf');fecharModalPDF();
  }catch(e){alert('Erro PDF: '+e.message)}
}

// === CORREÇÃO 2: se sair de "Venda Fechada", deletar venda e gasto vinculados ===
async function mudarAndamento(id,v){
  var l=await get('leads');var lead=l.find(function(x){return x.id==id});if(!lead)return;
  // Se mudando PARA "Venda Fechada" e ainda não estava
  if(v=='Venda Fechada'&&lead.andamento!='Venda Fechada'){
    idxVender=lead;
    document.getElementById('infoGasto').textContent='Cliente: '+lead.nome+' | '+hoje();
    document.getElementById('gastoValor').value=lead.valor||'';
    document.getElementById('gastoGasto').value='';document.getElementById('gastoEmpresa').value='SF';document.getElementById('gastoPotencia').value='';
    document.getElementById('modalGasto').classList.add('show');return;
  }
  // Se saindo DE "Venda Fechada" para outro status → deletar venda e gasto vinculados
  if(lead.andamento=='Venda Fechada'&&v!='Venda Fechada'){
    var vendas=await get('vendas');
    var vDel=vendas.filter(function(x){return x.cliente==lead.nome});
    for(var i=0;i<vDel.length;i++){
      // Deletar gasto vinculado
      var gastos=await get('gastos');
      var gDel=gastos.filter(function(x){return x.cliente==lead.nome});
      for(var j=0;j<gDel.length;j++){await del('gastos',gDel[j].id)}
      // Deletar venda
      await del('vendas',vDel[i].id);
    }
    limparCache();
  }
  await upd('leads',id,{andamento:v});pagLeads();
}

  var nome=document.getElementById('orcNome').value.trim();if(!nome){document.getElementById('orcMsg').textContent='Informe o nome';return}
  var cal=calcOrc(),id=document.getElementById('orcId').value||gerarOrcId();
  await ins('orcamentos',{id:id,nome:nome,tel:document.getElementById('orcTel').value,endereco:document.getElementById('orcEnd').value,titulo:document.getElementById('orcTit').value,validade:document.getElementById('orcVal').value,pagamento:document.getElementById('orcPag').value,vendedor:document.getElementById('orcVend').value,cidade:document.getElementById('orcCid').value,status:document.getElementById('orcStatus').value,itens:JSON.parse(JSON.stringify(ORC_ITENS)),subtotal:cal.s,desconto:cal.d,taxa:cal.tx,total:cal.t,data:hoje()});
  var L=await get('leads');if(!L.find(function(x){return x.nome==nome})){await ins('leads',{nome:nome,cidade:document.getElementById('orcCid').value||'',origem:'Orçamento',valor:'R$ '+fmtNum(cal.t),contato:document.getElementById('orcTel').value,data:hoje(),andamento:'Orçamento Gerado',vendedor:document.getElementById('orcVend').value||'Sistema'})}
  for(var i=0;i<ORC_ITENS.length;i++){var E=await get('estoque');var ee=E.find(function(x){return x.item.toLowerCase()==ORC_ITENS[i].item.toLowerCase()});if(ee)await upd('estoque',ee.id,{qtd:Math.max(0,ee.qtd-ORC_ITENS[i].qtd)})}
  document.getElementById('orcMsg').textContent='✅ Salvo!';ORC_HIST.unshift({id:id,nome:nome,total:cal.t,status:document.getElementById('orcStatus').value,data:hoje()});novoOrc();
}
function pdfOrc(){
  var nome=document.getElementById('orcNome').value.trim()||'Cliente',cal=calcOrc();
  try{var doc=new jspdf.jsPDF();doc.setFontSize(16);doc.text('SF Projetos Elétricos',14,22);doc.setFontSize(10);doc.text('Orçamento: '+document.getElementById('orcId').value,14,32);doc.text('Cliente: '+nome,14,42);doc.text('Data: '+hoje(),14,50);var d=[['Item','Qtd','V.Unit','Total']];ORC_ITENS.forEach(function(i){d.push([i.item,String(i.qtd),'R$ '+fmtNum(i.valor),'R$ '+fmtNum(i.total)])});if(doc.autoTable){doc.autoTable({startY:58,head:[d[0]],body:d.slice(1),theme:'striped',headStyles:{fillColor:[37,99,235]}});var y=doc.lastAutoTable.finalY+10;doc.text('Total: R$ '+fmtNum(cal.t),160,y)}doc.save('orcamento_'+nome.replace(/\s/g,'_')+'.pdf')}
  catch(e){alert('Erro PDF: '+e.message)}
}
function navOrc(pg){document.getElementById('orcBody').innerHTML=pg=='criar'?htmlCriarOrc():htmlHistOrc();document.querySelectorAll('.orc-nav span').forEach(function(e){e.classList.toggle('ativo',e.textContent.includes(pg=='criar'?'💰':'📜'))});if(pg=='criar'){carregarSelOrc();document.getElementById('orcId').value=gerarOrcId()}if(pg=='hist')carregarHist()}
function htmlHistOrc(){return '<div class="tabela-wrap"><table><thead><tr><th>ID</th><th>Cliente</th><th>Status</th><th>Total</th><th>Data</th><th>Ações</th></tr></thead><tbody id="orcHistBody"></tbody></table></div>'}
async function carregarHist(){var d=await get('orcamentos');var tb=document.getElementById('orcHistBody');if(!tb)return;tb.innerHTML='';if(!d.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:30px">Nenhum</td></tr>';return}d.forEach(function(o){tb.innerHTML+='<tr><td><strong>'+o.id+'</strong></td><td>'+o.nome+'</td><td><select class="edita-select" style="width:140px" onchange="altStatusOrc(\''+o.id+'\',this.value)"><option value="Aguardando Pedido"'+(o.status=='Aguardando Pedido'?' selected':'')+'>Aguardando</option><option value="Aprovado"'+(o.status=='Aprovado'?' selected':'')+'>Aprovado</option><option value="Cancelado"'+(o.status=='Cancelado'?' selected':'')+'>Cancelado</option><option value="Em Negociação"'+(o.status=='Em Negociação'?' selected':'')+'>Em Negoc.</option></select></td><td>R$ '+fmtNum(o.total)+'</td><td>'+(o.data||'')+'</td><td><button class="btn-icone" onclick="reprintOrc(\''+o.id+'\',\''+o.nome+'\','+o.total+')">🔄 PDF</button><button class="btn-icone" onclick="delOrcHist(\''+o.id+'\')">🗑️</button></td></tr>'})}
async function altStatusOrc(id,v){await sb.from('orcamentos').update({status:v}).eq('id',id)}
function reprintOrc(id,nome,total){try{var doc=new jspdf.jsPDF();doc.setFontSize(16);doc.text('SF Projetos Elétricos',14,22);doc.setFontSize(12);doc.text('Orçamento: '+id,14,32);doc.text('Cliente: '+nome,14,42);doc.text('Valor: R$ '+fmtNum(total),14,52);doc.text('Emitido: '+hoje(),14,62);doc.save('orcamento_'+nome.replace(/\s/g,'_')+'.pdf')}catch(e){alert('Erro: '+e.message)}}
async function delOrcHist(id){if(!confirm('Excluir?'))return;await sb.from('orcamentos').delete().eq('id',id);await pagOrcamentos()}
// ========== ESTOQUE ==========
async function pagEstoque(){
  var d=await get('estoque');var ct=0,vt=0;d.forEach(function(e){ct+=e.qtd*e.valor_pago;vt+=e.qtd*e.valor_venda});
  var h='<div class="titulo-pag">📦 Estoque</div><p style="margin-bottom:12px">'+d.length+' itens • Custo: R$ '+fmtNum(ct)+' • Venda: R$ '+fmtNum(vt)+'</p><button class="btn btn-success" onclick="abrirModalEstq()" style="margin-bottom:12px">+ Novo</button><div class="estq-grid">';
  d.forEach(function(e){var c=e.qtd<=3?'critico':e.qtd<=10?'baixo':'ok';h+='<div class="estq-item"><div class="nome">'+e.item+'</div><div class="info">'+(e.marca?e.marca+' ':'')+e.tipo+'</div><div class="qtd '+c+'">'+e.qtd+' <span style="font-size:12px;color:var(--text2)">'+e.un+'</span></div></div>'});
  h+='</div><div class="tabela-wrap"><table><thead><tr><th>Item</th><th>Tipo</th><th>Marca</th><th>Qtd</th><th>Un</th><th>Vlr Pago</th><th>Vlr Venda</th><th>Total</th><th>Fornec</th><th>Ações</th></tr></thead><tbody>';
  d.forEach(function(e){h+='<tr><td>'+e.item+'</td><td>'+(e.tipo||'')+'</td><td>'+(e.marca||'')+'</td><td style="font-weight:600;color:'+(e.qtd<=3?'var(--perigo)':e.qtd<=10?'var(--aviso)':'var(--sucesso)')+'">'+e.qtd+'</td><td>'+e.un+'</td><td>R$ '+fmtNum(e.valor_pago)+'</td><td>R$ '+fmtNum(e.valor_venda)+'</td><td>R$ '+fmtNum(e.qtd*e.valor_venda)+'</td><td>'+(e.fornec||'')+'</td><td><button class="btn-icone" onclick="editEstq('+e.id+')">✏️</button><button class="btn-icone" onclick="delEstq('+e.id+')">🗑️</button></td></tr>'});
  if(!d.length)h+='<tr><td colspan="10" style="text-align:center;padding:30px">Vazio</td></tr>';h+='</tbody></table></div>';document.getElementById('conteudo').innerHTML=h;
}
function abrirModalEstq(item){idEditEstq=item?item.id:null;document.getElementById('estqItem').value=item?item.item:'';document.getElementById('estqTipo').value=item?item.tipo:'';document.getElementById('estqMarca').value=item?item.marca:'';document.getElementById('estqQtd').value=item?item.qtd:0;document.getElementById('estqUn').value=item?item.un:'un';document.getElementById('estqPago').value=item?item.valor_pago:'';document.getElementById('estqVenda').value=item?item.valor_venda:'';document.getElementById('estqFornec').value=item?item.fornec:'';document.getElementById('modalEstoque').classList.add('show')}
function fecharModalEstoque(){document.getElementById('modalEstoque').classList.remove('show')}
async function salvarEstoque(){var item=document.getElementById('estqItem').value.trim(),tipo=document.getElementById('estqTipo').value.trim(),marca=document.getElementById('estqMarca').value.trim(),qtd=parseInt(document.getElementById('estqQtd').value)||0,un=document.getElementById('estqUn').value,vp=parseFloat(document.getElementById('estqPago').value)||0,vv=parseFloat(document.getElementById('estqVenda').value)||0,fornec=document.getElementById('estqFornec').value.trim();if(!item){alert('Nome obrigatório');return}if(idEditEstq){await upd('estoque',idEditEstq,{item,tipo,marca,qtd,un,valor_pago:vp,valor_venda:vv,fornec})}else{await ins('estoque',{item,tipo,marca,qtd,un,valor_pago:vp,valor_venda:vv,fornec})}fecharModalEstoque();pagEstoque()}
async function editEstq(id){var d=await get('estoque');var e=d.find(function(x){return x.id==id});if(e)abrirModalEstq(e)}
async function delEstq(id){if(!confirm('Excluir?'))return;await del('estoque',id);pagEstoque()}
// ========== CONFIG ==========
async function pagConfig(){
  if(usuarioAtual.funcao!='Administrador'){document.getElementById('conteudo').innerHTML='<div class="titulo-pag">⚙️ Config</div><p>Acesso restrito</p>';return}
  var u=await get('usuarios');var pj=await get('projetos');var el=[];pj.forEach(function(p){if(p.empresa&&el.indexOf(p.empresa)==-1)el.push(p.empresa)});
  var h='<div class="titulo-pag">⚙️ Config</div>'+
    '<div style="background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:16px;margin-bottom:14px"><h3 style="font-size:14px;font-weight:600;margin-bottom:10px">💾 Backup</h3><p style="font-size:13px;color:var(--text2);margin-bottom:10px">Gere um arquivo Excel com todos os dados do sistema.</p><button class="btn btn-success" onclick="fazerBackup()">📥 Exportar Excel</button><div id="bkMsg" style="margin-top:6px;font-size:13px"></div></div>'+
    '<div style="background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:16px;margin-bottom:14px"><h3 style="font-size:14px;font-weight:600;margin-bottom:10px">👤 Novo Usuário</h3><div class="form-grid-4"><div class="grupo"><label>Nome</label><input id="cNome"></div><div class="grupo"><label>Usuário</label><input id="cUser"></div><div class="grupo"><label>Senha</label><input type="password" id="cPass"></div><div class="grupo"><label>Função</label><select id="cFun" onchange="document.getElementById(\'cEmpresaGroup\').style.display=this.value==\'Empresa\'?\'block\':\'none\'"><option>Vendedor</option><option>Administrador</option><option>Financeiro</option><option>Empresa</option></select></div><div class="grupo" id="cEmpresaGroup" style="display:none"><label>Empresa</label><input id="cEmpresa" list="cEmpresaList"><datalist id="cEmpresaList"></datalist></div></div><button class="btn btn-primary" onclick="addUser()" style="margin-top:6px">+ Cadastrar</button><div id="cMsg" style="margin-top:6px;color:var(--sucesso);font-size:13px"></div></div><div style="background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:16px"><h3 style="font-size:14px;font-weight:600;margin-bottom:10px">👥 Cadastrados</h3><div class="tabela-wrap"><table><thead><tr><th>Nome</th><th>Usuário</th><th>Função</th><th>Empresa</th><th>Ação</th></tr></thead><tbody>';
  u.forEach(function(x,i){h+='<tr><td>'+x.nome+'</td><td>'+x.usuario+'</td><td>'+(x.funcao||'')+'</td><td>'+(x.empresa||'—')+'</td><td>'+(i>0?'<button class="btn-icone" onclick="rmUser('+x.id+')">🗑️</button>':' —')+'</td></tr>'});
  h+='</tbody></table></div></div>';document.getElementById('conteudo').innerHTML=h;
  var dl=document.getElementById('cEmpresaList');if(dl){dl.innerHTML='';el.forEach(function(e){dl.innerHTML+='<option value="'+e+'">'})}
}
async function fazerBackup(){
  var msg=document.getElementById('bkMsg');if(!msg)return;msg.textContent='Gerando backup...';msg.style.color='var(--aviso)';
  try{
    var wb=XLSX.utils.book_new();var tabelas=['leads','vendas','gastos','projetos','estoque','orcamentos','usuarios'];
    for(var i=0;i<tabelas.length;i++){
      var data=await get(tabelas[i]);
      if(tabelas[i]==='projetos'){data=data.map(function(p){var c=Object.assign({},p);if(c.documentos){try{c.documentos=JSON.parse(c.documentos).map(function(d){return d.nome}).join('; ')}catch(e){}}if(c.fotos){try{c.fotos=JSON.parse(c.fotos).length+' foto(s)'}catch(e){}}return c})}
      if(tabelas[i]==='orcamentos'){data=data.map(function(o){var c=Object.assign({},o);if(c.itens){try{c.itens=JSON.stringify(c.itens)}catch(e){}}return c})}
      var ws=XLSX.utils.json_to_sheet(data.length?data:[{aviso:'Sem dados'}]);XLSX.utils.book_append_sheet(wb,ws,tabelas[i]);
    }
    XLSX.writeFile(wb,'backup_crm_'+hoje().replace(/\//g,'-')+'.xlsx');msg.textContent='✅ Backup gerado!';msg.style.color='var(--sucesso)';
  }catch(e){msg.textContent='Erro: '+e.message;msg.style.color='var(--perigo)'}
}
async function addUser(){var n=document.getElementById('cNome').value.trim(),u=document.getElementById('cUser').value.trim(),p=document.getElementById('cPass').value.trim(),f=document.getElementById('cFun').value,emp=document.getElementById('cEmpresa').value.trim();if(!n||!u||!p){document.getElementById('cMsg').textContent='Preencha todos';return}if(f=='Empresa'&&!emp){document.getElementById('cMsg').textContent='Informe a empresa';return}var ex=await get('usuarios');if(ex.find(function(x){return x.usuario==u})){document.getElementById('cMsg').textContent='Usuário já existe';return}await ins('usuarios',{nome:n,usuario:u,senha:p,funcao:f,empresa:emp});document.getElementById('cMsg').textContent='Cadastrado!';document.getElementById('cNome').value='';document.getElementById('cUser').value='';document.getElementById('cPass').value='';document.getElementById('cEmpresa').value='';pagConfig()}
async function rmUser(id){if(!confirm('Remover?'))return;await del('usuarios',id);pagConfig()}
