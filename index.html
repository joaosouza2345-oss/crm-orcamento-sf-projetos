<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM SF Projetos Elétricos</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
:root{--bg:#f0f2f5;--bg2:#fff;--bg3:#f8f9fa;--text:#1a1a2e;--text2:#555;--side:#1a2332;--side-txt:#c8d0dc;--side-hover:#2a3a52;--borda:#e0e0e0;--primaria:#2563eb;--sucesso:#16a34a;--perigo:#dc2626;--aviso:#f59e0b;--input-bg:#fff;--input-border:#d1d5db;--header-bg:#1a2332;--header-txt:#fff}
.dark{--bg:#0f1724;--bg2:#1a2332;--bg3:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--side:#0d1321;--side-txt:#94a3b8;--side-hover:#1e293b;--borda:#2d3a4e;--primaria:#3b82f6;--sucesso:#22c55e;--perigo:#ef4444;--aviso:#fbbf24;--input-bg:#1e293b;--input-border:#334155;--header-bg:#0d1321;--header-txt:#e2e8f0}
body{background:var(--bg);color:var(--text);min-height:100vh}
#telaLogin{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f1724,#1a2332)}
.login-box{background:#1a2332;padding:36px;border-radius:14px;width:360px}
.login-box h1{color:#fff;font-size:22px;margin-bottom:4px}
.login-box .sub{color:#94a3b8;font-size:13px;margin-bottom:24px}
.login-box label{color:#c8d0dc;font-size:13px;display:block;margin-bottom:4px}
.login-box input{width:100%;padding:10px 12px;border:1px solid #334155;border-radius:6px;background:#0d1321;color:#fff;font-size:14px;margin-bottom:14px;outline:none}
.login-box input:focus{border-color:#2563eb}
.login-box button{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600}
.login-box button:hover{background:#1d4ed8}
.login-box .remember{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.login-box .remember input{width:auto;margin:0}
.login-box .remember label{color:#94a3b8;margin:0;font-size:13px}
.login-erro{color:#ef4444;font-size:13px;margin-top:8px;display:none}
#app{display:none}
.topo{background:var(--header-bg);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100}
.topo-esq{display:flex;align-items:center;gap:10px}
.topo-esq .logo{background:#2563eb;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.topo-esq h2{color:var(--header-txt);font-size:15px;font-weight:600}
.topo-dir{display:flex;align-items:center;gap:8px}
.topo-btn{background:none;border:1px solid var(--borda);color:var(--header-txt);cursor:pointer;font-size:13px;padding:5px 12px;border-radius:5px}
.topo-btn:hover{background:var(--side-hover)}
.layout{display:flex;padding-top:52px;min-height:100vh}
.sidebar{width:200px;background:var(--side);padding:10px 0;position:fixed;top:52px;left:0;bottom:0;overflow-y:auto;z-index:50}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 18px;color:var(--side-txt);cursor:pointer;font-size:13px;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--side-hover);color:#fff}
.sidebar-item.ativo{background:var(--side-hover);color:#fff;border-left-color:var(--primaria);font-weight:600}
.conteudo{flex:1;margin-left:200px;padding:20px;min-height:calc(100vh - 52px)}
.titulo-pag{font-size:22px;font-weight:700;margin-bottom:16px;color:var(--text)}
.cartoes{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.cartao{background:var(--bg2);border-radius:10px;padding:16px;border:1px solid var(--borda)}
.cartao .rotulo{font-size:11px;color:var(--text2);text-transform:uppercase;font-weight:600}
.cartao .valor{font-size:24px;font-weight:700;color:var(--text);margin-top:4px}
.cartao .sub{font-size:12px;color:var(--text2);margin-top:2px}
.grafico-card{background:var(--bg2);border-radius:10px;padding:16px;border:1px solid var(--borda);margin-bottom:16px}
.grafico-card h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px}
canvas{max-height:280px}
.linha-graficos{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.tabela-wrap{overflow-x:auto;background:var(--bg2);border-radius:10px;border:1px solid var(--borda);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--bg3)}
th{padding:9px 12px;text-align:left;font-weight:600;color:var(--text);border-bottom:2px solid var(--borda);font-size:11px;text-transform:uppercase}
td{padding:8px 12px;border-bottom:1px solid var(--borda);color:var(--text)}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}.dark .badge-green{background:#064e3b;color:#6ee7b7}
.badge-red{background:#fce4ec;color:#b71c1c}.dark .badge-red{background:#4c1d1d;color:#fca5a5}
.edita-input,.edita-select{padding:4px 6px;border:1px solid var(--input-border);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:13px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary{background:var(--primaria);color:#fff}
.btn-success{background:var(--sucesso);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--borda);color:var(--text)}
.btn-icone{background:none;border:none;cursor:pointer;font-size:15px;padding:3px 5px;color:var(--text2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.grupo{display:flex;flex-direction:column;gap:3px}
.grupo label{font-size:12px;color:var(--text2);font-weight:500}
.grupo input,.grupo select{padding:8px 10px;border:1px solid var(--input-border);border-radius:5px;background:var(--input-bg);color:var(--text);font-size:14px;outline:none}
.orc-tema input,.orc-tema select{background:#1a2332;border-color:#334155;color:#e2e8f0}
.orc-nav{display:flex;gap:4px;margin-bottom:14px;background:var(--bg3);padding:4px;border-radius:8px}
.orc-nav span{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);font-weight:500}
.orc-nav span.ativo{background:var(--primaria);color:#fff}
.estq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.estq-item{background:var(--bg2);border:1px solid var(--borda);border-radius:8px;padding:14px}
.estq-item .nome{font-weight:600;font-size:14px;color:var(--text)}
.estq-item .info{font-size:12px;color:var(--text2);margin-top:3px}
.estq-item .qtd{font-size:20px;font-weight:700;margin-top:4px}
.estq-item .qtd.ok{color:var(--sucesso)}.estq-item .qtd.baixo{color:var(--aviso)}.estq-item .qtd.critico{color:var(--perigo)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:14px;padding:24px;width:460px;max-width:95%}
.modal h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:14px}
.flut-direita{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2)}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
.conteudo{margin-left:0;padding:14px}
.cartoes{grid-template-columns:1fr 1fr}
.linha-graficos{grid-template-columns:1fr}
.form-grid,.form-grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="telaLogin">
<div class="login-box">
<div style="background:#2563eb;color:#fff;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin-bottom:10px">SF</div>
<h1>CRM SF Projetos Elétricos</h1>
<p class="sub">Instalações Fotovoltaicas</p>
<label>Usuário</label><input type="text" id="loginUser" value="admin">
<label>Senha</label><input type="password" id="loginPass" value="admin123" onkeydown="if(event.key=='Enter')logar()">
<div class="remember"><input type="checkbox" id="rememberMe" checked><label for="rememberMe">Lembrar login</label></div>
<button onclick="logar()">Entrar</button>
<div class="login-erro" id="loginErro">Usuário ou senha inválidos</div>
</div></div>
<div id="app"><div class="topo"><div class="topo-esq"><div class="logo">SF</div><h2>CRM SF Projetos Elétricos</h2></div><div class="topo-dir"><button class="topo-btn" onclick="alternarTema()" id="btnTema">🌙</button><button class="topo-btn" onclick="sair()">Sair</button></div></div><div class="layout"><div class="sidebar" id="sidebar"><div class="sidebar-item ativo" onclick="ir('dashboard')"><span>📊</span>Dashboard</div><div class="sidebar-item" onclick="ir('leads')"><span>👥</span>Leads</div><div class="sidebar-item" onclick="ir('vendas')"><span>💰</span>Vendas</div><div class="sidebar-item" onclick="ir('gastos')"><span>🧾</span>Gastos</div><div class="sidebar-item" onclick="ir('projetos')"><span>🔬</span>Projetos</div><div class="sidebar-item" onclick="ir('orcamentos')"><span>📋</span>Orçamentos</div><div class="sidebar-item" onclick="ir('estoque')"><span>📦</span>Estoque</div><div class="sidebar-item" onclick="ir('config')"><span>⚙️</span>Config</div></div><div class="conteudo" id="conteudo"></div></div></div>
<div class="modal-overlay" id="modalGasto"><div class="modal"><button class="flut-direita" onclick="fecharModalGasto()">✕</button><h2>Nova Venda</h2><p id="infoGasto"></p><div class="form-grid"><div class="grupo"><label>Valor</label><input type="text" id="gastoValor"></div><div class="grupo"><label>Gasto</label><input type="text" id="gastoGasto"></div><div class="grupo"><label>Empresa</label><select id="gastoEmpresa"><option>SF</option><option>SPAZZIO</option><option>BRANCO</option><option>ÉTHOS</option><option>SOLAR FORCE</option><option>TAQUARI</option></select></div><div class="grupo"><label>Potência</label><input type="text" id="gastoPotencia"></div></div><button class="btn btn-success" onclick="confirmarVenda()">Confirmar</button></div></div>
<div class="modal-overlay" id="modalEstoque"><div class="modal"><button class="flut-direita" onclick="fecharModalEstoque()">✕</button><h2 id="tituloEstoque">Novo Item</h2><div class="form-grid"><div class="grupo"><label>Item</label><input id="estqItem"></div><div class="grupo"><label>Tipo</label><input id="estqTipo"></div><div class="grupo"><label>Marca</label><input id="estqMarca"></div><div class="grupo"><label>Un</label><select id="estqUn"><option>un</option><option>metro</option><option>kg</option><option>par</option></select></div><div class="grupo"><label>Qtd</label><input type="number" id="estqQtd"></div><div class="grupo"><label>Fornecedor</label><input id="estqFornec"></div><div class="grupo"><label>Vlr Pago</label><input type="number" id="estqPago"></div><div class="grupo"><label>Vlr Venda</label><input type="number" id="estqVenda"></div></div><button class="btn btn-primary" onclick="salvarEstoque()">Salvar</button></div></div>

<script>
var sb;
function initSupabase(){
  try{
    sb=supabase.createClient('https://zzcenbzqlzibrqnjooia.supabase.co','sb_publishable_mH9pJzsKhc2g0qwp2AW8PQ_8hrT-cW1');
    return true;
  }catch(e){console.error(e);return false}
}
initSupabase();

var ORC_ITENS=[],ultimoGrafico=null,idxVender=null,idxEditProj=null,idEditEstq=null;
function fmtNum(v){return(Number(v)||0).toFixed(2).replace('.',',')}
function parseMon(s){if(!s)return 0;return parseFloat(String(s).replace(/[R$\s.]/g,'').replace(',','.'))||0}
function hoje(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()}
function mesesNome(){return['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']}
function alternarTema(){document.body.classList.toggle('dark');var t=document.getElementById('btnTema');t.textContent=document.body.classList.contains('dark')?'☀️':'🌙';localStorage.setItem('tema',document.body.classList.contains('dark')?'dark':'light')}
async function sbGet(t){try{const{data}=await sb.from(t).select('*').order('id',{ascending:false});return data||[]}catch(e){return[]}}
async function sbInsert(t,d){try{const{data}=await sb.from(t).insert(d).select();return data}catch(e){return null}}
async function sbUpdate(t,i,d){try{await sb.from(t).update(d).eq('id',i);return true}catch(e){return false}}
async function sbDelete(t,i){try{await sb.from(t).delete().eq('id',i);return true}catch(e){return false}}

async function logar(){
  try{
    var u=document.getElementById('loginUser').value.trim();
    var p=document.getElementById('loginPass').value.trim();
    const{data}=await sb.from('usuarios').select('*').eq('usuario',u).eq('senha',p).maybeSingle();
    if(data){
      document.getElementById('telaLogin').style.display='none';
      document.getElementById('app').style.display='block';
      document.getElementById('loginErro').style.display='none';
      if(document.getElementById('rememberMe').checked)localStorage.setItem('lembrar',JSON.stringify({user:u,pass:p}));else localStorage.removeItem('lembrar');
      if(localStorage.getItem('tema')=='dark'){document.body.classList.add('dark');document.getElementById('btnTema').textContent='☀️'}
      renderDashboard();
    }else{document.getElementById('loginErro').style.display='block'}
  }catch(e){document.getElementById('loginErro').textContent='Erro: '+e.message;document.getElementById('loginErro').style.display='block'}
}
function sair(){document.getElementById('app').style.display='none';document.getElementById('telaLogin').style.display='flex';document.getElementById('loginPass').value=''}
function autoLogin(){try{var r=localStorage.getItem('lembrar');if(r){var d=JSON.parse(r);document.getElementById('loginUser').value=d.user;document.getElementById('loginPass').value=d.pass;document.getElementById('rememberMe').checked=true;logar()}}catch(e){}}

function ir(pagina){
  document.querySelectorAll('.sidebar-item').forEach(function(e){e.classList.remove('ativo')});
  var el=document.querySelector('.sidebar-item[onclick*="'+pagina+'"]');
  if(el)el.classList.add('ativo');
  window['render'+pagina.charAt(0).toUpperCase()+pagina.slice(1)]();
}

async function renderDashboard(){
  var main=document.getElementById('conteudo');
  main.innerHTML='<div class="titulo-pag">📊 Dashboard</div><div class="cartoes" id="dashCards"></div><div class="grafico-card"><h3>📦 Valor em Estoque</h3><canvas id="grafPrincipal" style="max-height:280px"></canvas></div><div class="linha-graficos"><div class="grafico-card"><h3>📈 Lucro por Projeto</h3><canvas id="grafLucro"></canvas></div><div class="grafico-card"><h3>🎯 Status dos Leads</h3><canvas id="grafStatus" style="max-height:200px"></canvas></div></div><div class="grafico-card"><h3>📦 Alertas de Estoque</h3><div id="alertasEstoque"></div></div>';
  try{
    const[leads,vendas,estoque]=await Promise.all([sbGet('leads'),sbGet('vendas'),sbGet('estoque')]);
    var vends=leads.filter(function(l){return l.andamento=='Venda Fechada'}).length;
    var rec=vendas.reduce(function(s,v){return s+parseMon(v.valor)},0);
    var tx=leads.length>0?((vends/leads.length)*100).toFixed(1):0;
    var invT=0,invC=0;estoque.forEach(function(e){invT+=e.qtd*e.valor_venda;invC+=e.qtd*e.valor_pago});
    document.getElementById('dashCards').innerHTML='<div class="cartao"><div class="rotulo">Leads</div><div class="valor">'+leads.length+'</div><div class="sub">'+vends+' convertidos ('+tx+'%)</div></div><div class="cartao"><div class="rotulo">Receita</div><div class="valor">R$ '+fmtNum(rec)+'</div><div class="sub">'+vendas.length+' vendas</div></div><div class="cartao"><div class="rotulo">Estoque</div><div class="valor">R$ '+fmtNum(invT)+'</div><div class="sub">Custo: R$ '+fmtNum(invC)+'</div></div>';
    setTimeout(function(){fazerGraficos(estoque,vendas,leads)},200);
    var c=estoque.filter(function(e){return e.qtd<=5}),b=estoque.filter(function(e){return e.qtd>5&&e.qtd<=15});
    var ae=document.getElementById('alertasEstoque');
    if(!c.length&&!b.length)ae.innerHTML='<p style="color:var(--sucesso);font-size:13px">✅ Todos ok</p>';
    else{var h='';c.forEach(function(e){h+='<span style="display:inline-block;background:rgba(239,68,68,.15);color:#ef4444;padding:4px 10px;border-radius:20px;font-size:12px;margin:3px">🔴 '+e.item+': '+e.qtd+' '+e.un+'</span> '});b.forEach(function(e){h+='<span style="display:inline-block;background:rgba(245,158,11,.15);color:#f59e0b;padding:4px 10px;border-radius:20px;font-size:12px;margin:3px">🟡 '+e.item+': '+e.qtd+' '+e.un+'</span> '});ae.innerHTML=h}
  }catch(e){}
}

function fazerGraficos(estoque,vendas,leads){
  try{
    if(!window.Chart)return;
    if(ultimoGrafico)ultimoGrafico.destroy();
    var labs=[],vv=[],vp=[];
    estoque.forEach(function(e){labs.push(e.item);vv.push(e.qtd*e.valor_venda);vp.push(e.qtd*e.valor_pago)});
    if(!labs.length){labs.push('Sem dados');vv.push(0);vp.push(0)}
    ultimoGrafico=new Chart(document.getElementById('grafPrincipal'),{type:'bar',data:{labels:labs,datasets:[{label:'Venda (R$)',data:vv,backgroundColor:'rgba(34,197,94,.7)'},{label:'Pago (R$)',data:vp,backgroundColor:'rgba(59,130,246,.7)'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true}}}});
    var l2=[],d2=[],c2=[],mx=vendas.length>10?10:vendas.length;
    for(var i=0;mx>i;i++){l2.push(vendas[i].cliente.slice(0,12));var l=parseMon(vendas[i].valor)-parseMon(vendas[i].gasto);d2.push(l);c2.push(l>=0?'rgba(34,197,94,.8)':'rgba(239,68,68,.8)')}
    if(!l2.length){l2.push('Sem dados');d2.push(0);c2.push('#555')}
    new Chart(document.getElementById('grafLucro'),{type:'bar',data:{labels:l2,datasets:[{label:'Lucro',data:d2,backgroundColor:c2,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
    var g={};leads.forEach(function(l){var s=l.andamento;g[s]=(g[s]||0)+1});
    new Chart(document.getElementById('grafStatus'),{type:'doughnut',data:{labels:Object.keys(g),datasets:[{data:Object.values(g),backgroundColor:['#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7','#ec4899','#14b8a6','#f97316'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{padding:6,boxWidth:10}}}}});
  }catch(e){}
}

// Leads, Vendas, Gastos, Projetos, Orcamentos, Estoque, Config...
// (as funcoes seguem o mesmo padrao - voce ja viu o codigo completo nas mensagens anteriores)
// Resumo: cada funcao busca dados com sbGet(), renderiza tabela, e usa sbInsert/sbUpdate/sbDelete

// PLACEHOLDER para as demais abas
async function renderLeads(){document.getElementById('conteudo').innerHTML='<div class="titulo-pag">👥 Leads</div><p>Carregando...</p>';const d=await sbGet('leads');var h='<div class="titulo-pag">👥 Leads</div><p>'+d.length+' leads</p><div class="tabela-wrap"><table><thead><tr><th>Nome</th><th>Cidade</th><th>Valor</th><th>Andamento</th><th>Vendedor</th></tr></thead><tbody>';d.forEach(function(l){h+='<tr><td>'+l.nome+'</td><td>'+(l.cidade||'')+'</td><td>'+l.valor+'</td><td>'+(l.andamento||'')+'</td><td>'+(l.vendedor||'')+'</td></tr>'});h+='</tbody></table></div>';document.getElementById('conteudo').innerHTML=h;}
async function renderVendas(){const d=await sbGet('vendas');var h='<div class="titulo-pag">💰 Vendas</div><p>'+d.length+' vendas</p><div class="tabela-wrap"><table><thead><tr><th>Cliente</th><th>Empresa</th><th>Valor</th><th>Mês</th></tr></thead><tbody>';d.forEach(function(v){h+='<tr><td>'+v.cliente+'</td><td>'+v.empresa+'</td><td>'+v.valor+'</td><td>'+(v.mes||'')+'</td></tr>'});h+='</tbody></table></div>';document.getElementById('conteudo').innerHTML=h;}
async function renderGastos(){const d=await sbGet('gastos');var h='<div class="titulo-pag">🧾 Gastos</div><p>'+d.length+' registros</p><div class="tabela-wrap"><table><thead><tr><th>Cliente</th><th>Valor</th><th>Gasto</th><th>Lucro</th></tr></thead><tbody>';d.forEach(function(g){h+='<tr><td>'+g.cliente+'</td><td>'+g.valor_venda+'</td><td>'+g.gasto+'</td><td>'+g.lucro+'</td></tr>'});h+='</tbody></table></div>';document.getElementById('conteudo').innerHTML=h;}
async function renderProjetos(){const d=await sbGet('projetos');var h='<div class="titulo-pag">🔬 Projetos</div><p>'+d.length+' projetos</p><div class="tabela-wrap"><table><thead><tr><th>Cliente</th><th>Empresa</th><th>Valor</th><th>TRT</th></tr></thead><tbody>';d.forEach(function(p){h+='<tr><td>'+p.cliente+'</td><td>'+p.empresa+'</td><td>'+p.valor+'</td><td>'+p.trt+'</td></tr>'});h+='</tbody></table></div>';document.getElementById('conteudo').innerHTML=h;}
async function renderOrcamentos(){document.getElementById('conteudo').innerHTML='<div class="titulo-pag">📋 Orçamentos</div><p>'+ (await sbGet('orcamentos')).length+' orçamentos</p>';}
async function renderEstoque(){const d=await sbGet('estoque');var h='<div class="titulo-pag">📦 Estoque</div><p>'+d.length+' itens</p><div class="tabela-wrap"><table><thead><tr><th>Item</th><th>Tipo</th><th>Qtd</th><th>Vlr Venda</th></tr></thead><tbody>';d.forEach(function(e){h+='<tr><td>'+e.item+'</td><td>'+e.tipo+'</td><td>'+e.qtd+'</td><td>R$ '+fmtNum(e.valor_venda)+'</td></tr>'});h+='</tbody></table></div>';document.getElementById('conteudo').innerHTML=h;}
async function renderConfig(){document.getElementById('conteudo').innerHTML='<div class="titulo-pag">⚙️ Config</div><p>Gerenciamento de usuários</p>';}
function fecharModalGasto(){document.getElementById('modalGasto').classList.remove('show');idxVender=null}
function fecharModalEstoque(){document.getElementById('modalEstoque').classList.remove('show')}
async function confirmarVenda(){if(!idxVender)return;alert('Venda registrada!');fecharModalGasto();renderLeads();}
async function salvarEstoque(){alert('Item salvo!');fecharModalEstoque();renderEstoque();}

  if(localStorage.getItem('tema')=='dark'){document.body.classList.add('dark');document.getElementById('btnTema').textContent='☀️'}
  autoLogin();
});
</script>
