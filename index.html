<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM SF Projetos Elétricos</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.3/jspdf.plugin.autotable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
:root{--bg:#f0f2f5;--bg2:#fff;--bg3:#f8f9fa;--text:#1a1a2e;--text2:#555;--side:#1a2332;--side-txt:#c8d0dc;--side-hover:#2a3a52;--borda:#e0e0e0;--primaria:#2563eb;--sucesso:#16a34a;--perigo:#dc2626;--aviso:#f59e0b;--input-bg:#fff;--input-border:#d1d5db;--header-bg:#1a2332;--header-txt:#fff}
.dark{--bg:#0f1724;--bg2:#1a2332;--bg3:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--side:#0d1321;--side-txt:#94a3b8;--side-hover:#1e293b;--borda:#2d3a4e;--primaria:#3b82f6;--sucesso:#22c55e;--perigo:#ef4444;--aviso:#fbbf24;--input-bg:#1e293b;--input-border:#334155;--header-bg:#0d1321;--header-txt:#e2e8f0}
body{background:var(--bg);color:var(--text);min-height:100vh}
#telaLogin{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f1724,#1a2332)}
.login-box{background:#1a2332;padding:36px;border-radius:14px;width:360px}
.login-box h1{color:#fff;font-size:22px;margin-bottom:4px}
.login-box .sub{color:#94a3b8;font-size:13px;margin-bottom:24px}
.login-box label{color:#c8d0dc;font-size:13px;display:block;margin-bottom:4px}
.login-box input{width:100%;padding:10px 12px;border:1px solid #334155;border-radius:6px;background:#0d1321;color:#fff;font-size:14px;margin-bottom:14px;outline:none}
.login-box input:focus{border-color:#2563eb}
.login-box button{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600}
.login-box button:hover{background:#1d4ed8}
.login-box .remember{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.login-box .remember input{width:auto;margin:0}
.login-box .remember label{color:#94a3b8;margin:0;font-size:13px}
.login-erro{color:#ef4444;font-size:13px;margin-top:8px;display:none}
#app{display:none}
.topo{background:var(--header-bg);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100}
.topo-esq{display:flex;align-items:center;gap:10px}
.topo-esq .logo{background:#2563eb;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.topo-esq h2{color:var(--header-txt);font-size:15px;font-weight:600}
.topo-dir{display:flex;align-items:center;gap:8px}
.topo-btn{background:none;border:1px solid var(--borda);color:var(--header-txt);cursor:pointer;font-size:13px;padding:5px 12px;border-radius:5px}
.topo-btn:hover{background:var(--side-hover)}
.layout{display:flex;padding-top:52px;min-height:100vh}
.sidebar{width:200px;background:var(--side);padding:10px 0;position:fixed;top:52px;left:0;bottom:0;overflow-y:auto;z-index:50}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 18px;color:var(--side-txt);cursor:pointer;font-size:13px;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--side-hover);color:#fff}
.sidebar-item.ativo{background:var(--side-hover);color:#fff;border-left-color:var(--primaria);font-weight:600}
.conteudo{flex:1;margin-left:200px;padding:20px;min-height:calc(100vh - 52px)}
.titulo-pag{font-size:22px;font-weight:700;margin-bottom:16px;color:var(--text)}
.cartoes{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.cartao{background:var(--bg2);border-radius:10px;padding:16px;border:1px solid var(--borda);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cartao .rotulo{font-size:11px;color:var(--text2);text-transform:uppercase;font-weight:600}
.cartao .valor{font-size:24px;font-weight:700;color:var(--text);margin-top:4px}
.cartao .sub{font-size:12px;color:var(--text2);margin-top:2px}
.grafico-card{background:var(--bg2);border-radius:10px;padding:16px;border:1px solid var(--borda);margin-bottom:16px}
.grafico-card h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px}
canvas{max-height:280px}.linha-graficos{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.barra-abas{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.barra-abas button{padding:6px 14px;border:1px solid var(--borda);border-radius:6px;background:var(--bg3);color:var(--text2);cursor:pointer;font-size:12px;font-weight:500}
.barra-abas button.ativo{background:var(--primaria);color:#fff;border-color:var(--primaria)}
.sub-barra{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.sub-barra button{padding:4px 12px;border:1px solid var(--borda);border-radius:5px;background:transparent;color:var(--text2);cursor:pointer;font-size:11px}
.sub-barra button.ativo{background:var(--primaria);color:#fff;border-color:var(--primaria)}
.tabela-wrap{overflow-x:auto;background:var(--bg2);border-radius:10px;border:1px solid var(--borda);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--bg3)}
th{padding:9px 12px;text-align:left;font-weight:600;color:var(--text);border-bottom:2px solid var(--borda);font-size:11px;text-transform:uppercase}
td{padding:8px 12px;border-bottom:1px solid var(--borda);color:var(--text)}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}.dark .badge-green{background:#064e3b;color:#6ee7b7}
.badge-red{background:#fce4ec;color:#b71c1c}.dark .badge-red{background:#4c1d1d;color:#fca5a5}
.badge-yellow{background:#fef3c7;color:#92400e}.dark .badge-yellow{background:#4d3d00;color:#fde68a}
.edita-input,.edita-select{padding:4px 6px;border:1px solid var(--input-border);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:13px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary{background:var(--primaria);color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:var(--sucesso);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--borda);color:var(--text)}
.btn-icone{background:none;border:none;cursor:pointer;font-size:15px;padding:3px 5px;color:var(--text2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.grupo{display:flex;flex-direction:column;gap:3px}
.grupo label{font-size:12px;color:var(--text2);font-weight:500}
.grupo input,.grupo select{padding:8px 10px;border:1px solid var(--input-border);border-radius:5px;background:var(--input-bg);color:var(--text);font-size:14px;outline:none}
.orc-tema{--bg:#0f1724;--bg2:#1a2332;--bg3:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--border:#2d3a4e;--input-bg:#1a2332;--input-border:#334155}
.orc-tema .cartao{background:#1a2332;border-color:#334155}.orc-tema input,.orc-tema select{background:#1a2332;border-color:#334155;color:#e2e8f0}
.orc-nav{display:flex;gap:4px;margin-bottom:14px;background:var(--bg3);padding:4px;border-radius:8px}
.orc-nav span{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);font-weight:500}
.orc-nav span.ativo{background:var(--primaria);color:#fff}
.estq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.estq-item{background:var(--bg2);border:1px solid var(--borda);border-radius:8px;padding:14px}
.estq-item .nome{font-weight:600;font-size:14px;color:var(--text)}
.estq-item .info{font-size:12px;color:var(--text2);margin-top:3px}
.estq-item .qtd{font-size:20px;font-weight:700;margin-top:4px}
.estq-item .qtd.ok{color:var(--sucesso)}.estq-item .qtd.baixo{color:var(--aviso)}.estq-item .qtd.critico{color:var(--perigo)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:14px;padding:24px;width:540px;max-width:95%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:14px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:14px}
.flut-direita{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2)}
.checkbox-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.checkbox-grid label{font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text)}
.filtros-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:end}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.conteudo{margin-left:0;padding:14px}.cartoes{grid-template-columns:1fr 1fr}.linha-graficos{grid-template-columns:1fr}.form-grid,.form-grid-3,.form-grid-4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="telaLogin">
<div class="login-box">
<div style="background:#2563eb;color:#fff;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin-bottom:10px">SF</div>
<h1>CRM SF</h1>
<p class="sub">Instalações Fotovoltaicas</p>
<label>Usuário</label><input type="text" id="loginUser" value="admin">
<label>Senha</label><input type="password" id="loginPass" value="admin123" onkeydown="if(event.key=='Enter')logar()">
<div class="remember"><input type="checkbox" id="rememberMe"><label for="rememberMe">Lembrar login</label></div>
<button onclick="logar()">Entrar</button>
<div class="login-erro" id="loginErro">Usuário ou senha inválidos</div>
</div></div>
<div id="app">
<div class="topo"><div class="topo-esq"><div class="logo">SF</div><h2>CRM SF Projetos Elétricos</h2></div><div class="topo-dir"><span id="userInfo" style="color:var(--header-txt);font-size:12px;margin-right:8px"></span><button class="topo-btn" onclick="alternarTema()" id="btnTema">🌙</button><button class="topo-btn" onclick="sair()">Sair</button></div></div>
<div class="layout"><div class="sidebar" id="sidebar"></div><div class="conteudo" id="conteudo"></div></div></div>

<div class="modal-overlay" id="modalLeads"><div class="modal">
<button class="flut-direita" onclick="fecharModalLeads()">✕</button><h2>👤 Novo Lead</h2>
<div class="form-grid">
<div class="grupo"><label>Nome *</label><input id="leadNome"></div>
<div class="grupo"><label>Cidade</label><input id="leadCidade"></div>
<div class="grupo"><label>Telefone</label><input id="leadTel"></div>
<div class="grupo"><label>Origem</label><select id="leadOrigem"><option>Indicação</option><option>Instagram</option><option>Facebook</option><option>Site</option><option>WhatsApp</option><option>Orçamento</option><option>Outro</option></select></div>
<div class="grupo"><label>Valor Estimado</label><input id="leadValor" value="R$ 0,00"></div>
<div class="grupo"><label>Vendedor</label><select id="leadVendedor"><option>João</option><option>Bruno</option><option>Vinicius</option><option>Sistema</option></select></div>
<div class="grupo"><label>Observação</label><input id="leadObs"></div></div>
<button class="btn btn-primary" onclick="salvarLeadModal()">💾 Salvar</button></div></div>

<div class="modal-overlay" id="modalGasto"><div class="modal">
<button class="flut-direita" onclick="fecharModalGasto()">✕</button><h2>💰 Nova Venda</h2><p id="infoGasto"></p>
<div class="form-grid">
<div class="grupo"><label>Valor</label><input type="text" id="gastoValor"></div>
<div class="grupo"><label>Gasto</label><input type="text" id="gastoGasto"></div>
<div class="grupo"><label>Empresa</label><select id="gastoEmpresa"><option>SF</option><option>SPAZZIO</option><option>BRANCO</option><option>ÉTHOS</option><option>SOLAR FORCE</option><option>TAQUARI</option></select></div>
<div class="grupo"><label>Potência</label><input type="text" id="gastoPotencia"></div></div>
<button class="btn btn-success" onclick="confirmarVenda()">Confirmar</button></div></div>

<div class="modal-overlay" id="modalEstoque"><div class="modal">
<button class="flut-direita" onclick="fecharModalEstoque()">✕</button><h2 id="tituloEstoque">Novo Item</h2>
<div class="form-grid">
<div class="grupo"><label>Item</label><input id="estqItem"></div><div class="grupo"><label>Tipo</label><input id="estqTipo"></div>
<div class="grupo"><label>Marca</label><input id="estqMarca"></div><div class="grupo"><label>Un</label><select id="estqUn"><option>un</option><option>metro</option><option>kg</option><option>par</option></select></div>
<div class="grupo"><label>Qtd</label><input type="number" id="estqQtd"></div><div class="grupo"><label>Fornecedor</label><input id="estqFornec"></div>
<div class="grupo"><label>Vlr Pago</label><input type="number" id="estqPago"></div><div class="grupo"><label>Vlr Venda</label><input type="number" id="estqVenda"></div></div>
<button class="btn btn-primary" onclick="salvarEstoque()">Salvar</button></div></div>

<div class="modal-overlay" id="modalPDFProjetos"><div class="modal">
<button class="flut-direita" onclick="fecharModalPDF()">✕</button><h2>📄 Exportar Projetos em PDF</h2>
<div class="form-grid">
<div class="grupo"><label>Empresa</label><select id="pdfFiltroEmpresa"><option value="">Todas</option></select></div>
<div class="grupo"><label>Pago</label><select id="pdfFiltroPago"><option value="">Todos</option><option value="SIM">SIM</option><option value="NÃO">NÃO</option></select></div>
<div class="grupo"><label>Data início</label><input type="text" id="pdfDataInicio" placeholder="dd/mm/aaaa"></div>
<div class="grupo"><label>Data fim</label><input type="text" id="pdfDataFim" placeholder="dd/mm/aaaa"></div></div>
<p style="font-size:13px;color:var(--text2);margin-bottom:8px">Selecione os campos:</p>
<div class="checkbox-grid">
<label><input type="checkbox" id="pdfCampoCliente" checked>Cliente</label>
<label><input type="checkbox" id="pdfCampoEmpresa" checked>Empresa</label>
<label><input type="checkbox" id="pdfCampoData" checked>Data</label>
<label><input type="checkbox" id="pdfCampoValor" checked>Valor</label>
<label><input type="checkbox" id="pdfCampoTRT" checked>TRT</label>
<label><input type="checkbox" id="pdfCampoLiquido" checked>Líquido</label>
<label><input type="checkbox" id="pdfCampoPago" checked>Pago</label></div>
<button class="btn btn-success" onclick="gerarPDFProjetos()">📄 Gerar PDF</button></div></div>

<script>
const sb = supabase.createClient('https://zzcenbzqlzibrqnjooia.supabase.co','sb_publishable_mH9pJzsKhc2g0qwp2AW8PQ_8hrT-cW1');
var ORC_ITENS=[],ORC_HIST=[],ultimoGrafico=null,abaToggle='estoque',subLead='status',subProj='empresa';
var idxVender=null,idxEditProj=null,idEditEstq=null,usuarioAtual=null;

function fmtNum(v){return(Number(v)||0).toFixed(2).replace('.',',')}
function parseMon(s){if(!s)return 0;return parseFloat(String(s).replace(/[R$\s.]/g,'').replace(',','.'))||0}
function hoje(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()}
function anoAtual(){return new Date().getFullYear()}
function mesesNome(){return['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']}
function alternarTema(){document.body.classList.toggle('dark');var t=document.getElementById('btnTema');t.textContent=document.body.classList.contains('dark')?'☀️':'🌙';localStorage.setItem('tema',document.body.classList.contains('dark')?'dark':'light')}
async function sbGet(t){try{const{data}=await sb.from(t).select('*').order('id',{ascending:false});return data||[]}catch(e){return[]}}
async function sbInsert(t,d){try{const{data}=await sb.from(t).insert(d).select();return data||null}catch(e){return null}}
async function sbUpdate(t,i,d){try{await sb.from(t).update(d).eq('id',i);return true}catch(e){return false}}
async function sbDelete(t,i){try{await sb.from(t).delete().eq('id',i);return true}catch(e){return false}}

function montarSidebar(){
  var items=[
    {id:'dashboard',ico:'📊',label:'Dashboard',roles:['Administrador','Financeiro','Vendedor','Empresa']},
    {id:'leads',ico:'👥',label:'Leads',roles:['Administrador','Financeiro','Vendedor']},
    {id:'vendas',ico:'💰',label:'Vendas',roles:['Administrador','Financeiro']},
    {id:'gastos',ico:'🧾',label:'Gastos',roles:['Administrador','Financeiro']},
    {id:'projetos',ico:'🔬',label:'Projetos',roles:['Administrador','Financeiro','Empresa']},
    {id:'orcamentos',ico:'📋',label:'Orçamentos',roles:['Administrador','Financeiro','Vendedor']},
    {id:'estoque',ico:'📦',label:'Estoque',roles:['Administrador','Financeiro']},
    {id:'config',ico:'⚙️',label:'Config',roles:['Administrador']}
  ];
  var sidebar=document.getElementById('sidebar');sidebar.innerHTML='';
  for(var i=0;i<items.length;i++){
    var ok=false;for(var r=0;r<items[i].roles.length;r++){if(items[i].roles[r]==usuarioAtual.funcao){ok=true;break}}
    if(!ok)continue;
    var div=document.createElement('div');div.className='sidebar-item'+(i===0?' ativo':'');div.setAttribute('data-page',items[i].id);
    div.innerHTML='<span>'+items[i].ico+'</span>'+items[i].label;
    div.onclick=(function(pg){return function(){ir(pg)}})(items[i].id);
    sidebar.appendChild(div);
  }
}

async function logar(){
  try{
    var u=document.getElementById('loginUser').value.trim();
    var p=document.getElementById('loginPass').value.trim();
    const{data}=await sb.from('usuarios').select('*').eq('usuario',u).eq('senha',p).maybeSingle();
    if(data){
      usuarioAtual=data;
      document.getElementById('telaLogin').style.display='none';
      document.getElementById('app').style.display='block';
      document.getElementById('loginErro').style.display='none';
      document.getElementById('userInfo').textContent=data.funcao+(data.empresa?' - '+data.empresa:'');
      if(document.getElementById('rememberMe').checked){
        localStorage.setItem('lembrar_user',JSON.stringify({user:u,pass:p}));
      }else{
        localStorage.removeItem('lembrar_user');
      }
      if(localStorage.getItem('tema')=='dark'){document.body.classList.add('dark');document.getElementById('btnTema').textContent='☀️'}
      montarSidebar();
      if(data.funcao=='Empresa')ir('projetos');else ir('dashboard');
    }else{document.getElementById('loginErro').style.display='block'}
  }catch(e){document.getElementById('loginErro').textContent='Erro: '+e.message;document.getElementById('loginErro').style.display='block'}
}

function sair(){
  document.getElementById('app').style.display='none';
  document.getElementById('telaLogin').style.display='flex';
  document.getElementById('loginPass').value='';
}

async function autoLogin(){
  try{
    var r=localStorage.getItem('lembrar_user');
    if(!r)return;
    try{var d=JSON.parse(r)}catch(e){d=r}
    document.getElementById('loginUser').value=d.user;
    document.getElementById('loginPass').value=d.pass;
    document.getElementById('rememberMe').checked=true;
    await logar();
  }catch(e){}
}

function ir(pagina){
  document.querySelectorAll('.sidebar-item').forEach(function(e){e.classList.remove('ativo')});
  var el=document.querySelector('.sidebar-item[data-page="'+pagina+'"]');
  if(el)el.classList.add('ativo');
  var fn=window['render'+pagina.charAt(0).toUpperCase()+pagina.slice(1)];
  if(fn)fn();else document.getElementById('conteudo').innerHTML='<div class="titulo-pag">'+pagina+'</div><p>...</p>';
}

async function renderDashboard(){
  var main=document.getElementById('conteudo');
  var funcao=usuarioAtual.funcao,isEmpresa=(funcao=='Empresa'),isVendedor=(funcao=='Vendedor');
  
  if(isEmpresa){
    main.innerHTML='<div class="titulo-pag">📊 Dashboard</div><div class="cartoes" id="dashCards"></div>';
    try{const projetos=await sbGet('projetos');var f=projetos.filter(function(p){return p.empresa==usuarioAtual.empresa});var rt=0,trt=0;f.forEach(function(p){rt+=parseMon(p.valor);trt+=parseMon(p.trt)});document.getElementById('dashCards').innerHTML='<div class="cartao"><div class="rotulo">Projetos</div><div class="valor">'+f.length+'</div></div><div class="cartao"><div class="rotulo">Total</div><div class="valor">R$ '+fmtNum(rt)+'</div></div><div class="cartao"><div class="rotulo">Líquido</div><div class="valor">R$ '+fmtNum(rt-trt)+'</div></div>'}catch(e){}return;
  }

function renderDashProjCards(projetos){
  var div=document.getElementById('dashProjCards');if(!div)return;
  var emp=document.getElementById('dashFiltroEmpresa')?document.getElementById('dashFiltroEmpresa').value:'';
  var pg=document.getElementById('dashFiltroPago')?document.getElementById('dashFiltroPago').value:'';
  var di=document.getElementById('dashFiltroDataIni')?document.getElementById('dashFiltroDataIni').value:'';
  var df=document.getElementById('dashFiltroDataFim')?document.getElementById('dashFiltroDataFim').value:'';
  
  var filt=projetos||window._dashProjetos||[];
  if(emp)filt=filt.filter(function(p){return p.empresa==emp});
  if(pg)filt=filt.filter(function(p){return p.pago==pg});
  if(di){var pdi=di.split('/');if(pdi.length==3)filt=filt.filter(function(p){if(!p.data)return true;var pd=p.data.split('/');if(pd.length!=3)return true;return new Date(pdi[2],pdi[1]-1,pdi[0])<=new Date(pd[2],pd[1]-1,pd[0])})}
  if(df){var pdf=df.split('/');if(pdf.length==3)filt=filt.filter(function(p){if(!p.data)return true;var pd=p.data.split('/');if(pd.length!=3)return true;return new Date(pdf[2],pdf[1]-1,pdf[0])>=new Date(pd[2],pd[1]-1,pd[0])})}
  
  if(!filt.length){div.innerHTML='<p style="color:var(--text2)">Nenhum projeto encontrado</p>';return}
  var rt=0,trt=0;filt.forEach(function(p){rt+=parseMon(p.valor);trt+=parseMon(p.trt)});
  div.innerHTML='';
  var h='<div class="cartoes">';
  filt.forEach(function(p){var liq=parseMon(p.valor)-parseMon(p.trt);h+='<div class="cartao" style="border-left:4px solid '+(p.pago=='SIM'?'var(--sucesso)':'var(--aviso)')+'"><div class="rotulo">'+p.cliente+'</div><div class="sub">'+p.empresa+' | '+(p.data||'')+'</div><div class="valor" style="font-size:18px">R$ '+fmtNum(parseMon(p.valor))+'</div><div class="sub">TRT: R$ '+fmtNum(parseMon(p.trt))+' | Liq: R$ '+fmtNum(liq)+' | '+(p.pago=='SIM'?'✅':'⏳')+'</div></div>'});
  h+='</div>';
  div.innerHTML=h;
}

  var dados=window._dashProjetos||[];

  var emp=document.getElementById('pdfFiltroEmpresa').value;

  var di=document.getElementById('pdfDataInicio').value;

  if(emp)dados=dados.filter(function(p){return p.empresa==emp});
  if(pg)dados=dados.filter(function(p){return p.pago==pg});
  if(di){var pdi=di.split('/');if(pdi.length==3)dados=dados.filter(function(p){if(!p.data)return true;var pd=p.data.split('/');if(pd.length!=3)return true;var d1=new Date(pdi[2],pdi[1]-1,pdi[0]),d2=new Date(pd[2],pd[1]-1,pd[0]);return d2>=d1})}
  if(df){var pdf=df.split('/');if(pdf.length==3)dados=dados.filter(function(p){if(!p.data)return true;var pd=p.data.split('/');if(pd.length!=3)return true;var d1=new Date(pdf[2],pdf[1]-1,pdf[0]),d2=new Date(pd[2],pd[1]-1,pd[0]);return d2<=d1})}
  
  if(!dados.length){alert('Nenhum projeto encontrado');return}
  
  try{
    var{jsPDF}=window.jspdf;
    var doc=new jsPDF();
    doc.setFontSize(16);doc.text('SF Projetos Elétricos',14,22);
    doc.setFontSize(12);doc.text('Relatório de Projetos',14,32);
    doc.setFontSize(10);doc.text('Gerado: '+hoje(),14,40);
    if(emp)doc.text('Empresa: '+emp,14,48);else{var e=di||df?'Período: '+(di||'')+' a '+(df||''):'Todas as empresas';doc.text('Filtro: '+e,14,48)}
    var y0=52;
    var cabecalho=[];if(campos.cliente)cabecalho.push('Cliente');if(campos.empresa)cabecalho.push('Empresa');if(campos.data)cabecalho.push('Data');if(campos.valor)cabecalho.push('Valor');if(campos.trt)cabecalho.push('TRT');if(campos.liquido)cabecalho.push('Líquido');if(campos.pago)cabecalho.push('Pago');
    var corpo=[];dados.forEach(function(p){var linha=[];if(campos.cliente)linha.push(p.cliente);if(campos.empresa)linha.push(p.empresa||'');if(campos.data)linha.push(p.data||'');if(campos.valor)linha.push('R$ '+fmtNum(parseMon(p.valor)));if(campos.trt)linha.push('R$ '+fmtNum(parseMon(p.trt)));if(campos.liquido)linha.push('R$ '+fmtNum(parseMon(p.valor)-parseMon(p.trt)));if(campos.pago)linha.push(p.pago=='SIM'?'Sim':'Não');corpo.push(linha)});
    doc.autoTable({startY:y0,head:[cabecalho],body:corpo,theme:'striped',headStyles:{fillColor:[37,99,235]}});
    var total=dados.reduce(function(s,p){return s+parseMon(p.valor)},0);

    var y=doc.lastAutoTable.finalY+10;
    doc.setFontSize(10);doc.text('Total Projetos: '+dados.length,14,y);
    doc.text('Valor Total: R$ '+fmtNum(total),14,y+8);
    doc.text('TRT Total: R$ '+fmtNum(totalTrt),14,y+16);
    doc.text('Líquido Total: R$ '+fmtNum(total-totalTrt),14,y+24);
    doc.save('projetos_'+(emp||'todos')+'.pdf');

}

function trocarAba(aba){
  abaToggle=aba;
  var bts=document.querySelectorAll('#barraToggle button');
  var mapa={estoque:'📦',leads:'👥',vendas:'💰',projetos:'🔬',orcamentos:'📋'};
  for(var i=0;bts.length>i;i++)bts[i].classList.toggle('ativo',bts[i].textContent.includes(mapa[aba]));
  var sub=document.getElementById('subBarra');
  if(aba=='leads')sub.innerHTML='<div class="sub-barra"><button class="ativo" onclick="subLead=\'status\';trocarAba(\'leads\')">📊 Status</button><button onclick="subLead=\'vendedor\';trocarAba(\'leads\')">👤 Vendedor</button></div>';
  else if(aba=='projetos')sub.innerHTML='<div class="sub-barra"><button class="ativo" onclick="subProj=\'empresa\';trocarAba(\'projetos\')">🏢 Empresa</button><button onclick="subProj=\'pago\';trocarAba(\'projetos\')">💰 Pago/Aberto</button></div>';
  else sub.innerHTML='';

}

function reprintOrc(id,nome,total){try{var{jsPDF}=window.jspdf||window;if(!jsPDF&&typeof jspdf!='undefined')jsPDF=jspdf.jsPDF;var doc=new jsPDF();doc.setFontSize(16);doc.text('SF Projetos Elétricos',14,22);doc.setFontSize(12);doc.text('Orçamento: '+id,14,32);doc.text('Cliente: '+nome,14,42);doc.text('Valor: R$ '+fmtNum(total),14,52);doc.text('Emitido: '+hoje(),14,62);doc.save('orcamento_'+nome.replace(/\s/g,'_')+'.pdf')}catch(e){alert('Erro PDF: '+e.message)}}
async function delOrcHist(id){if(!confirm('Excluir?'))return;await sb.from('orcamentos').delete().eq('id',id);await renderOrcamentos()}

async function renderEstoque(){const dados=await sbGet('estoque');var ct=0,vt=0;dados.forEach(function(e){ct+=e.qtd*e.valor_pago;vt+=e.qtd*e.valor_venda});var h='<div class="titulo-pag">📦 Estoque</div><p style="margin-bottom:12px;color:var(--text2)">'+dados.length+' itens • Custo: R$ '+fmtNum(ct)+' • Venda: R$ '+fmtNum(vt)+'</p><button class="btn btn-success" onclick="abrirModalEstq()" style="margin-bottom:12px">+ Novo</button><div class="estq-grid">';dados.forEach(function(e){var c=e.qtd<=3?'critico':e.qtd<=10?'baixo':'ok';h+='<div class="estq-item"><div class="nome">'+e.item+'</div><div class="info">'+(e.marca?e.marca+' ':'')+e.tipo+'</div><div class="qtd '+c+'">'+e.qtd+' <span style="font-size:12px;color:var(--text2)">'+e.un+'</span></div></div>'});h+='</div><div class="tabela-wrap"><table><thead><tr><th>Item</th><th>Tipo</th><th>Marca</th><th>Qtd</th><th>Un</th><th>Vlr Pago</th><th>Vlr Venda</th><th>Total</th><th>Fornec</th><th>Ações</th></tr></thead><tbody>';dados.forEach(function(e){h+='<tr><td>'+e.item+'</td><td>'+(e.tipo||'')+'</td><td>'+(e.marca||'')+'</td><td style="font-weight:600;color:'+(e.qtd<=3?'var(--perigo)':e.qtd<=10?'var(--aviso)':'var(--sucesso)')+'">'+e.qtd+'</td><td>'+e.un+'</td><td>R$ '+fmtNum(e.valor_pago)+'</td><td>R$ '+fmtNum(e.valor_venda)+'</td><td>R$ '+fmtNum(e.qtd*e.valor_venda)+'</td><td>'+(e.fornec||'')+'</td><td><button class="btn-icone" onclick="editEstq('+e.id+')">✏️</button><button class="btn-icone" onclick="delEstq('+e.id+')">🗑️</button></td></tr>'});if(!dados.length)h+='<tr><td colspan="10" style="text-align:center;padding:30px;color:var(--text2)">Vazio</td></tr>';h+='</tbody></table></div>';document.getElementById('conteudo').innerHTML=h}
function abrirModalEstq(item){idEditEstq=item?item.id:null;document.getElementById('tituloEstoque').textContent=item?'Editar':'Novo';document.getElementById('estqItem').value=item?item.item:'';document.getElementById('estqTipo').value=item?item.tipo:'';document.getElementById('estqMarca').value=item?item.marca:'';document.getElementById('estqQtd').value=item?item.qtd:0;document.getElementById('estqUn').value=item?item.un:'un';document.getElementById('estqPago').value=item?item.valor_pago:'';document.getElementById('estqVenda').value=item?item.valor_venda:'';document.getElementById('estqFornec').value=item?item.fornec:'';document.getElementById('modalEstoque').classList.add('show')}
function fecharModalEstoque(){document.getElementById('modalEstoque').classList.remove('show')}
async function salvarEstoque(){var item=document.getElementById('estqItem').value.trim(),tipo=document.getElementById('estqTipo').value.trim(),marca=document.getElementById('estqMarca').value.trim(),qtd=parseInt(document.getElementById('estqQtd').value)||0,un=document.getElementById('estqUn').value,vp=parseFloat(document.getElementById('estqPago').value)||0,vv=parseFloat(document.getElementById('estqVenda').value)||0,fornec=document.getElementById('estqFornec').value.trim();if(!item){alert('Nome obrigatório');return}if(idEditEstq){await sbUpdate('estoque',idEditEstq,{item,tipo,marca,qtd,un,valor_pago:vp,valor_venda:vv,fornec})}else{await sbInsert('estoque',{item,tipo,marca,qtd,un,valor_pago:vp,valor_venda:vv,fornec})}fecharModalEstoque();renderEstoque()}
async function editEstq(id){const{data}=await sb.from('estoque').select('*').eq('id',id).single();if(data)abrirModalEstq(data)}
async function delEstq(id){if(!confirm('Excluir?'))return;await sbDelete('estoque',id);renderEstoque()}

async function renderConfig(){
  if(usuarioAtual.funcao!='Administrador'){document.getElementById('conteudo').innerHTML='<div class="titulo-pag">⚙️ Config</div><p>Acesso restrito</p>';return}
  const dados=await sbGet('usuarios');const projDados=await sbGet('projetos');var empsList=[];projDados.forEach(function(p){if(p.empresa&&empsList.indexOf(p.empresa)==-1)empsList.push(p.empresa)});
  var h='<div class="titulo-pag">⚙️ Config</div><div style="background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:16px;margin-bottom:14px"><h3 style="font-size:14px;font-weight:600;margin-bottom:10px">👤 Novo Usuário</h3><div class="form-grid-4"><div class="grupo"><label>Nome</label><input id="cNome"></div><div class="grupo"><label>Usuário</label><input id="cUser"></div><div class="grupo"><label>Senha</label><input type="password" id="cPass"></div><div class="grupo"><label>Função</label><select id="cFun" onchange="toggleEmpresaField()"><option>Vendedor</option><option>Administrador</option><option>Financeiro</option><option>Empresa</option></select></div><div class="grupo" id="cEmpresaGroup" style="display:none"><label>Empresa</label><input id="cEmpresa" list="cEmpresaList"><datalist id="cEmpresaList"></datalist></div></div><button class="btn btn-primary" onclick="addUser()" style="margin-top:6px">+ Cadastrar</button><div id="cMsg" style="margin-top:6px;font-size:13px;color:var(--sucesso)"></div></div><div style="background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:16px"><h3 style="font-size:14px;font-weight:600;margin-bottom:10px">👥 Cadastrados</h3><div class="tabela-wrap"><table><thead><tr><th>Nome</th><th>Usuário</th><th>Função</th><th>Empresa</th><th>Ação</th></tr></thead><tbody>';
  dados.forEach(function(u,i){var cor=u.funcao=='Administrador'?'style="background:#f3e8ff;color:#6b21a8"':u.funcao=='Financeiro'?'style="background:#dbeafe;color:#1e40af"':u.funcao=='Empresa'?'style="background:#fef3c7;color:#92400e"':'class="badge-green"';h+='<tr><td>'+u.nome+'</td><td>'+u.usuario+'</td><td><span class="badge" '+cor+'>'+(u.funcao||'')+'</span></td><td>'+(u.empresa||'—')+'</td><td>'+(i>0?'<button class="btn-icone" onclick="rmUser('+u.id+')">🗑️</button>':' —')+'</td></tr>'});h+='</tbody></table></div></div>';document.getElementById('conteudo').innerHTML=h
  var dl=document.getElementById('cEmpresaList');if(dl){dl.innerHTML='';empsList.forEach(function(e){dl.innerHTML+='<option value="'+e+'">'})}
}
function toggleEmpresaField(){document.getElementById('cEmpresaGroup').style.display=document.getElementById('cFun').value=='Empresa'?'block':'none'}
async function addUser(){var n=document.getElementById('cNome').value.trim(),u=document.getElementById('cUser').value.trim(),p=document.getElementById('cPass').value.trim(),f=document.getElementById('cFun').value,emp=document.getElementById('cEmpresa').value.trim();if(!n||!u||!p){document.getElementById('cMsg').textContent='Preencha todos';return}const{data:existe}=await sb.from('usuarios').select('*').eq('usuario',u).maybeSingle();if(existe){document.getElementById('cMsg').textContent='Usuário já existe';return}if(f=='Empresa'&&!emp){document.getElementById('cMsg').textContent='Informe a empresa';return}await sbInsert('usuarios',{nome:n,usuario:u,senha:p,funcao:f,empresa:emp});document.getElementById('cMsg').textContent='Cadastrado!';document.getElementById('cNome').value='';document.getElementById('cUser').value='';document.getElementById('cPass').value='';document.getElementById('cEmpresa').value='';renderConfig()}
async function rmUser(id){if(!confirm('Remover?'))return;await sbDelete('usuarios',id);renderConfig()}

function fazerGraficoLucro(vendas){try{if(window._gl)window._gl.destroy();var labs=[],dados=[],cores=[],mx=vendas.length>10?10:vendas.length;for(var i=0;mx>i;i++){labs.push(vendas[i].cliente.slice(0,12));var l=parseMon(vendas[i].valor)-parseMon(vendas[i].gasto);dados.push(l);cores.push(l>=0?'rgba(34,197,94,.8)':'rgba(239,68,68,.8)')}if(!labs.length){labs.push('Sem');dados.push(0);cores.push('#555')};window._gl=new Chart(document.getElementById('grafLucro'),{type:'bar',data:{labels:labs,datasets:[{label:'Lucro',data:dados,backgroundColor:cores}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}})}catch(e){}}
function fazerGraficoVendasMes(vendas){try{if(window._gvm)window._gvm.destroy();var meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];var dados=meses.map(function(m){var t=0;vendas.forEach(function(v){if(v.mes==m)t+=parseMon(v.valor)});return t});window._gvm=new Chart(document.getElementById('grafVendasMes'),{type:'line',data:{labels:meses,datasets:[{label:'Receita',data:dados,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.35}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}})}catch(e){}}
function fazerGraficoStatus(leads){try{if(window._gs)window._gs.destroy();var g={};leads.forEach(function(l){g[l.andamento]=(g[l.andamento]||0)+1});var paleta=['#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7','#ec4899','#14b8a6','#f97316','#6b7280'];window._gs=new Chart(document.getElementById('grafStatus'),{type:'doughnut',data:{labels:Object.keys(g),datasets:[{data:Object.values(g),backgroundColor:Object.keys(g).map(function(k,i){return paleta[i%paleta.length]}),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{padding:8,boxWidth:12}}}}})}catch(e){}}
function renderAlertas(estoque){var el=document.getElementById('alertasEstoque');if(!el)return;var c=estoque.filter(function(e){return e.qtd<=5}),b=estoque.filter(function(e){return e.qtd>5&&e.qtd<=15});if(!c.length&&!b.length){el.innerHTML='<p style="color:var(--sucesso)">✅ Todos ok</p>';return}var h='';c.forEach(function(e){h+='<span style="display:inline-block;background:rgba(239,68,68,.15);color:#ef4444;padding:4px 10px;border-radius:20px;font-size:12px;margin:3px">🔴 '+e.item+': '+e.qtd+' '+e.un+'</span> '});b.forEach(function(e){h+='<span style="display:inline-block;background:rgba(245,158,11,.15);color:#f59e0b;padding:4px 10px;border-radius:20px;font-size:12px;margin:3px">🟡 '+e.item+': '+e.qtd+' '+e.un+'</span> '});el.innerHTML=h}
