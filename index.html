<html lang="pt-BR">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
:root{--bg:#f0f2f5;--bg2:#fff;--bg3:#f8f9fa;--text:#1a1a2e;--text2:#555;--side:#1a2332;--side-txt:#c8d0dc;--side-hover:#2a3a52;--borda:#e0e0e0;--primaria:#2563eb;--sucesso:#16a34a;--perigo:#dc2626;--aviso:#f59e0b;--input-bg:#fff;--input-border:#d1d5db;--header-bg:#1a2332;--header-txt:#fff}
.dark{--bg:#0f1724;--bg2:#1a2332;--bg3:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--side:#0d1321;--side-txt:#94a3b8;--side-hover:#1e293b;--borda:#2d3a4e;--primaria:#3b82f6;--sucesso:#22c55e;--perigo:#ef4444;--aviso:#fbbf24;--input-bg:#1e293b;--input-border:#334155;--header-bg:#0d1321;--header-txt:#e2e8f0}
body{background:var(--bg);color:var(--text);min-height:100vh}
#telaLogin{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f1724,#1a2332)}
.login-box{background:#1a2332;padding:36px;border-radius:14px;width:360px}
.login-box h1{color:#fff;font-size:22px;margin-bottom:4px}
.login-box .sub{color:#94a3b8;font-size:13px;margin-bottom:24px}
.login-box label{color:#c8d0dc;font-size:13px;display:block;margin-bottom:4px}
.login-box input{width:100%;padding:10px 12px;border:1px solid #334155;border-radius:6px;background:#0d1321;color:#fff;font-size:14px;margin-bottom:14px;outline:none}
.login-box input:focus{border-color:#2563eb}
.login-box button{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600}
.login-box button:hover{background:#1d4ed8}
.login-box .remember{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.login-box .remember input{width:auto;margin:0}
.login-box .remember label{color:#94a3b8;margin:0;font-size:13px}
.login-erro{color:#ef4444;font-size:13px;margin-top:8px;display:none}
#app{display:none}
.topo{background:var(--header-bg);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100}
.topo-esq{display:flex;align-items:center;gap:10px}

.topo-esq h2{color:var(--header-txt);font-size:15px;font-weight:600}
.topo-dir{display:flex;align-items:center;gap:8px}
.topo-btn{background:none;border:1px solid var(--borda);color:var(--header-txt);cursor:pointer;font-size:13px;padding:5px 12px;border-radius:5px}

.layout{display:flex;padding-top:52px;min-height:100vh}
.sidebar{width:200px;background:var(--side);padding:10px 0;position:fixed;top:52px;left:0;bottom:0;overflow-y:auto;z-index:50}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 18px;color:var(--side-txt);cursor:pointer;font-size:13px;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--side-hover);color:#fff}
.sidebar-item.ativo{background:var(--side-hover);color:#fff;border-left-color:var(--primaria);font-weight:600}
.conteudo{flex:1;margin-left:200px;padding:20px;min-height:calc(100vh - 52px)}
.titulo-pag{font-size:22px;font-weight:700;margin-bottom:16px;color:var(--text)}
.cartoes{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:16px}
.cartao{background:var(--bg2);border-radius:10px;padding:16px;border:1px solid var(--borda)}
.cartao .rotulo{font-size:11px;color:var(--text2);text-transform:uppercase;font-weight:600}
.cartao .valor{font-size:22px;font-weight:700;color:var(--text);margin-top:4px}
.cartao .sub{font-size:12px;color:var(--text2);margin-top:2px}
.grafico-card{background:var(--bg2);border-radius:10px;padding:16px;border:1px solid var(--borda);margin-bottom:16px}
canvas{max-height:280px}
.linha-graficos{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.barra-abas{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.barra-abas button{padding:6px 14px;border:1px solid var(--borda);border-radius:6px;background:var(--bg3);color:var(--text2);cursor:pointer;font-size:12px;font-weight:500}
.barra-abas button.ativo{background:var(--primaria);color:#fff;border-color:var(--primaria)}
.sub-barra{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.sub-barra button{padding:4px 12px;border:1px solid var(--borda);border-radius:5px;background:transparent;color:var(--text2);cursor:pointer;font-size:11px}
.sub-barra button.ativo{background:var(--primaria);color:#fff;border-color:var(--primaria)}
.tabela-wrap{overflow-x:auto;background:var(--bg2);border-radius:10px;border:1px solid var(--borda);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--bg3)}
th{padding:9px 12px;text-align:left;font-weight:600;color:var(--text);border-bottom:2px solid var(--borda);font-size:11px;text-transform:uppercase}
td{padding:8px 12px;border-bottom:1px solid var(--borda);color:var(--text);vertical-align:middle}
tr:hover td{background:var(--bg3)}
.edita-input,.edita-select{padding:4px 6px;border:1px solid var(--input-border);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:13px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary{background:var(--primaria);color:#fff}
.btn-success{background:var(--sucesso);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--borda);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.grupo{display:flex;flex-direction:column;gap:3px}
.grupo label{font-size:12px;color:var(--text2);font-weight:500}
.grupo input,.grupo select{padding:8px 10px;border:1px solid var(--input-border);border-radius:5px;background:var(--input-bg);color:var(--text);font-size:14px;outline:none}
.orc-tema{--bg:#0f1724;--bg2:#1a2332;--bg3:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--input-bg:#1a2332;--input-border:#334155}
.orc-tema .cartao{background:#1a2332;border-color:#334155}
.orc-tema input,.orc-tema select{background:#1a2332;border-color:#334155;color:#e2e8f0}
.orc-nav{display:flex;gap:4px;margin-bottom:14px;background:var(--bg3);padding:4px;border-radius:8px}
.orc-nav span{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);font-weight:500}
.orc-nav span.ativo{background:var(--primaria);color:#fff}
.estq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.estq-item{background:var(--bg2);border:1px solid var(--borda);border-radius:8px;padding:14px}
.estq-item .nome{font-weight:600;font-size:14px;color:var(--text)}
.estq-item .info{font-size:12px;color:var(--text2);margin-top:3px}
.estq-item .qtd{font-size:20px;font-weight:700;margin-top:4px}
.estq-item .qtd.ok{color:var(--sucesso)}.estq-item .qtd.baixo{color:var(--aviso)}.estq-item .qtd.critico{color:var(--perigo)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:14px;padding:24px;width:600px;max-width:95%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:14px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:14px}
.flut-direita{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2)}
.checkbox-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.checkbox-grid label{font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text)}
.filtros-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:end}
.file-upload-area{border:2px dashed var(--borda);border-radius:8px;padding:20px;text-align:center;cursor:pointer;margin-bottom:10px}
.file-upload-area:hover{border-color:var(--primaria);background:var(--bg3)}
.file-upload-area input{display:none}
.file-preview{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.file-preview-item{background:var(--bg3);border:1px solid var(--borda);border-radius:6px;padding:8px;width:120px;text-align:center}
.file-preview-item img{width:100%;height:80px;object-fit:cover;border-radius:4px;margin-bottom:4px}
.file-preview-item .nome-arquivo{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-preview-item .file-info{font-size:10px;color:var(--text2)}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.conteudo{margin-left:0;padding:14px}.cartoes{grid-template-columns:1fr 1fr}.linha-graficos{grid-template-columns:1fr}.form-grid,.form-grid-3,.form-grid-4{grid-template-columns:1fr}}
</style>
</head>
<body>

<script>
var sb=supabase.createClient('https://zzcenbzqlzibrqnjooia.supabase.co','sb_publishable_mH9pJzsKhc2g0qwp2AW8PQ_8hrT-cW1');
var ORC_ITENS=[],ORC_HIST=[],ultimoGrafico=null,abaToggle='estoque',subLead='status',subProj='empresa';
var idxVender=null,idxEditProj=null,idxEditLead=null,idEditEstq=null,usuarioAtual=null,arquivosTemp=[],anexoProjId=null;
var cache={};

function fmtNum(v){return(Number(v)||0).toFixed(2).replace('.',',')}
function parseMon(s){if(!s)return 0;return parseFloat(String(s).replace(/[R$\s.]/g,'').replace(',','.'))||0}

function altTema(){document.body.classList.toggle('dark');document.getElementById('btnTema').textContent=document.body.classList.contains('dark')?'☀️':'🌙';localStorage.setItem('tema',document.body.classList.contains('dark')?'dark':'light')}

async function get(t){try{if(cache[t])return cache[t];const{data}=await sb.from(t).select('*').order('id',{ascending:false});cache[t]=data||[];return cache[t]}catch(e){return[]}}
async function ins(t,d){try{cache[t]=null;const{data}=await sb.from(t).insert(d).select();return data}catch(e){return null}}
async function upd(t,i,d){try{cache[t]=null;await sb.from(t).update(d).eq('id',i);return true}catch(e){return false}}
async function del(t,i){try{cache[t]=null;await sb.from(t).delete().eq('id',i);return true}catch(e){return false}}

function montarSidebar(){var mapa={Administrador:['dashboard','leads','vendas','gastos','projetos','orcamentos','estoque','config'],Financeiro:['dashboard','leads','vendas','gastos','projetos','orcamentos','estoque'],Vendedor:['dashboard','leads','orcamentos'],Empresa:['dashboard','projetos']};var rotulos={dashboard:'📊 Dashboard',leads:'👥 Leads',vendas:'💰 Vendas',gastos:'🧾 Gastos',projetos:'🔬 Projetos',orcamentos:'📋 Orçamentos',estoque:'📦 Estoque',config:'⚙️ Config'};var paginas=mapa[usuarioAtual.funcao]||['dashboard'];var s=document.getElementById('sidebar');s.innerHTML='';for(var i=0;i<paginas.length;i++){var d=document.createElement('div');d.className='sidebar-item'+(i===0?' ativo':'');d.dataset.page=paginas[i];d.innerHTML='<span>'+rotulos[paginas[i]]+'</span>';d.onclick=function(p){return function(){ir(p)}}(paginas[i]);s.appendChild(d)}}

function reprintOrc(id,nome,total){try{var doc=new jspdf.jsPDF();doc.setFontSize(16);doc.text('SF Projetos Elétricos',14,22);doc.setFontSize(12);doc.text('Orçamento: '+id,14,32);doc.text('Cliente: '+nome,14,42);doc.text('Valor: R$ '+fmtNum(total),14,52);doc.text('Emitido: '+hoje(),14,62);doc.save('orcamento_'+nome.replace(/\s/g,'_')+'.pdf')}catch(e){}}
async function delOrcHist(id){if(!confirm('Excluir?'))return;await sb.from('orcamentos').delete().eq('id',id);await pagOrcamentos()}

async function pagEstoque(){var d=await get('estoque');var h='<div class="titulo-pag">📦 Estoque</div><p>'+d.length+' itens</p><button class="btn btn-success" onclick="abrirModalEstq()" style="margin-bottom:12px">+ Novo</button><div class="tabela-wrap"><table><thead><tr><th>Item</th><th>Qtd</th><th>Vlr Venda</th><th>Ações</th></tr></thead><tbody>';d.forEach(function(e){h+='<tr><td>'+e.item+'</td><td style="font-weight:600;color:'+(e.qtd<=3?'var(--perigo)':e.qtd<=10?'var(--aviso)':'var(--sucesso)')+'">'+e.qtd+'</td><td>R$ '+fmtNum(e.valor_venda)+'</td><td><button class="btn-icone" onclick="editEstq('+e.id+')">✏️</button><button class="btn-icone" onclick="delEstq('+e.id+')">🗑️</button></td></tr>'});if(!d.length)h+='<tr><td colspan="4">Vazio</td></tr>';h+='</tbody></table></div>';document.getElementById('conteudo').innerHTML=h}
function abrirModalEstq(item){idEditEstq=item?item.id:null;document.getElementById('estqItem').value=item?item.item:'';document.getElementById('estqTipo').value=item?item.tipo:'';document.getElementById('estqMarca').value=item?item.marca:'';document.getElementById('estqQtd').value=item?item.qtd:0;document.getElementById('estqUn').value=item?item.un:'un';document.getElementById('estqPago').value=item?item.valor_pago:'';document.getElementById('estqVenda').value=item?item.valor_venda:'';document.getElementById('estqFornec').value=item?item.fornec:'';document.getElementById('modalEstoque').classList.add('show')}
function fecharModalEstoque(){document.getElementById('modalEstoque').classList.remove('show')}
async function salvarEstoque(){var item=document.getElementById('estqItem').value.trim(),tipo=document.getElementById('estqTipo').value.trim(),marca=document.getElementById('estqMarca').value.trim(),qtd=parseInt(document.getElementById('estqQtd').value)||0,un=document.getElementById('estqUn').value,vp=parseFloat(document.getElementById('estqPago').value)||0,vv=parseFloat(document.getElementById('estqVenda').value)||0,fornec=document.getElementById('estqFornec').value.trim();if(!item){alert('Nome obrigatório');return}if(idEditEstq){await upd('estoque',idEditEstq,{item,tipo,marca,qtd,un,valor_pago:vp,valor_venda:vv,fornec})}else{await ins('estoque',{item,tipo,marca,qtd,un,valor_pago:vp,valor_venda:vv,fornec})}fecharModalEstoque();pagEstoque()}
async function editEstq(id){var d=await get('estoque');var e=d.find(function(x){return x.id==id});if(e)abrirModalEstq(e)}
async function delEstq(id){if(!confirm('Excluir?'))return;await del('estoque',id);pagEstoque()}

async function pagConfig(){if(usuarioAtual.funcao!='Administrador'){document.getElementById('conteudo').innerHTML='<p>Acesso restrito</p>';return}var u=await get('usuarios');var h='<div class="titulo-pag">⚙️ Config</div><div style="background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:16px;margin-bottom:14px"><h3>👤 Novo Usuário</h3><div class="form-grid-4" style="margin-top:10px"><div class="grupo"><label>Nome</label><input id="cNome"></div><div class="grupo"><label>Usuário</label><input id="cUser"></div><div class="grupo"><label>Senha</label><input type="password" id="cPass"></div><div class="grupo"><label>Função</label><select id="cFun" onchange="document.getElementById(\'cEmpG\').style.display=this.value==\'Empresa\'?\'block\':\'none\'"><option>Vendedor</option><option>Administrador</option><option>Financeiro</option><option>Empresa</option></select></div><div class="grupo" id="cEmpG" style="display:none"><label>Empresa</label><input id="cEmp"></div></div><button class="btn btn-primary" onclick="addUser()">+ Cadastrar</button><div id="cMsg" style="margin-top:6px;font-size:13px"></div></div><div style="background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:16px"><h3>👥 Cadastrados</h3><div class="tabela-wrap"><table><thead><tr><th>Nome</th><th>Usuário</th><th>Função</th><th>Empresa</th><th>Ação</th></tr></thead><tbody>';u.forEach(function(x,i){h+='<tr><td>'+x.nome+'</td><td>'+x.usuario+'</td><td>'+x.funcao+'</td><td>'+(x.empresa||'-')+'</td><td>'+(i>0?'<button class="btn-icone" onclick="rmUser('+x.id+')">🗑️</button>':'-')+'</td></tr>'});h+='</tbody></table></div></div>';document.getElementById('conteudo').innerHTML=h}
async function addUser(){var n=document.getElementById('cNome').value.trim(),u=document.getElementById('cUser').value.trim(),p=document.getElementById('cPass').value.trim(),f=document.getElementById('cFun').value,emp=document.getElementById('cEmp').value.trim();if(!n||!u||!p){document.getElementById('cMsg').textContent='Preencha todos';return}if(f=='Empresa'&&!emp){document.getElementById('cMsg').textContent='Informe a empresa';return}var ex=await get('usuarios');if(ex.find(function(x){return x.usuario==u})){document.getElementById('cMsg').textContent='Já existe';return}await ins('usuarios',{nome:n,usuario:u,senha:p,funcao:f,empresa:emp});document.getElementById('cMsg').textContent='Cadastrado!';document.getElementById('cNome').value='';document.getElementById('cUser').value='';document.getElementById('cPass').value='';document.getElementById('cEmp').value='';pagConfig()}
async function rmUser(id){if(!confirm('Remover?'))return;await del('usuarios',id);pagConfig()}

document.addEventListener('DOMContentLoaded',function(){if(localStorage.getItem('tema')=='dark'){document.body.classList.add('dark');document.getElementById('btnTema').textContent='☀️'};autoLogin()});
</script>
</body>
