<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>CRM SF Projetos Elétricos</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.3/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
:root{--bg:#f0f2f5;--bg2:#fff;--bg3:#f8f9fa;--text:#1a1a2e;--text2:#555;--side:#1a2332;--side-txt:#c8d0dc;--side-hover:#2a3a52;--borda:#e0e0e0;--primaria:#2563eb;--sucesso:#16a34a;--perigo:#dc2626;--aviso:#f59e0b;--input-bg:#fff;--input-border:#d1d5db;--header-bg:#1a2332;--header-txt:#fff}
.dark{--bg:#0f1724;--bg2:#1a2332;--bg3:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--side:#0d1321;--side-txt:#94a3b8;--side-hover:#1e293b;--borda:#2d3a4e;--primaria:#3b82f6;--sucesso:#22c55e;--perigo:#ef4444;--aviso:#fbbf24;--input-bg:#1e293b;--input-border:#334155;--header-bg:#0d1321;--header-txt:#e2e8f0}
body{background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
#telaLogin{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f1724,#1a2332);padding:16px}
.login-box{background:#1a2332;padding:28px 24px;border-radius:14px;width:100%;max-width:360px}
.login-box h1{color:#fff;font-size:20px;margin-bottom:4px}
.login-box .sub{color:#94a3b8;font-size:13px;margin-bottom:24px}
.login-box label{color:#c8d0dc;font-size:13px;display:block;margin-bottom:4px}
.login-box input{width:100%;padding:10px 12px;border:1px solid #334155;border-radius:6px;background:#0d1321;color:#fff;font-size:16px;margin-bottom:14px;outline:none}
.login-box input:focus{border-color:#2563eb}
.login-box button{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600}
.login-box .remember{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.login-box .remember input{width:auto;margin:0}
.login-box .remember label{color:#94a3b8;margin:0;font-size:13px}
.login-erro{color:#ef4444;font-size:13px;margin-top:8px;display:none}
#app{display:none}
.topo{background:var(--header-bg);padding:0 12px;height:52px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100}
.topo-esq{display:flex;align-items:center;gap:8px}
.topo-esq .logo{background:#2563eb;width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.topo-esq h2{color:var(--header-txt);font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topo-dir{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topo-btn{background:none;border:1px solid var(--borda);color:var(--header-txt);cursor:pointer;font-size:13px;padding:5px 10px;border-radius:5px;white-space:nowrap}
.btn-hamburger{display:none;background:none;border:none;color:var(--header-txt);font-size:22px;cursor:pointer;padding:4px 8px}
.layout{display:flex;padding-top:52px;min-height:100vh}
.sidebar{width:200px;background:var(--side);padding:10px 0;position:fixed;top:52px;left:0;bottom:0;overflow-y:auto;z-index:50;transition:transform .25s}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 18px;color:var(--side-txt);cursor:pointer;font-size:13px;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--side-hover);color:#fff}
.sidebar-item.ativo{background:var(--side-hover);color:#fff;border-left-color:var(--primaria);font-weight:600}
.conteudo{flex:1;margin-left:200px;padding:16px;min-height:calc(100vh - 52px)}
.titulo-pag{font-size:20px;font-weight:700;margin-bottom:14px;color:var(--text)}
.cartoes{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.cartao{background:var(--bg2);border-radius:10px;padding:14px;border:1px solid var(--borda);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cartao .rotulo{font-size:11px;color:var(--text2);text-transform:uppercase;font-weight:600}
.cartao .valor{font-size:22px;font-weight:700;color:var(--text);margin-top:4px}
.cartao .sub{font-size:12px;color:var(--text2);margin-top:2px}
.grafico-card{background:var(--bg2);border-radius:10px;padding:14px;border:1px solid var(--borda);margin-bottom:14px}
canvas{max-height:280px}
.linha-graficos{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.barra-abas{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.barra-abas button{padding:6px 12px;border:1px solid var(--borda);border-radius:6px;background:var(--bg3);color:var(--text2);cursor:pointer;font-size:12px;font-weight:500}
.barra-abas button.ativo{background:var(--primaria);color:#fff;border-color:var(--primaria)}
.sub-barra{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.sub-barra button{padding:4px 10px;border:1px solid var(--borda);border-radius:5px;background:transparent;color:var(--text2);cursor:pointer;font-size:11px}
.sub-barra button.ativo{background:var(--primaria);color:#fff;border-color:var(--primaria)}
.tabela-wrap{overflow-x:auto;background:var(--bg2);border-radius:10px;border:1px solid var(--borda);margin-bottom:14px;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
thead{background:var(--bg3)}
th{padding:9px 12px;text-align:left;font-weight:600;color:var(--text);border-bottom:2px solid var(--borda);font-size:11px;text-transform:uppercase;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--borda);color:var(--text);vertical-align:middle}
tr:hover td{background:var(--bg3)}
.edita-input,.edita-select{padding:4px 6px;border:1px solid var(--input-border);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:13px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary{background:var(--primaria);color:#fff}
.btn-success{background:var(--sucesso);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--borda);color:var(--text)}
.btn-icone{background:none;border:none;cursor:pointer;font-size:15px;padding:3px 5px;color:var(--text2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.grupo{display:flex;flex-direction:column;gap:3px}
.grupo label{font-size:12px;color:var(--text2);font-weight:500}
.grupo input,.grupo select{padding:8px 10px;border:1px solid var(--input-border);border-radius:5px;background:var(--input-bg);color:var(--text);font-size:14px;outline:none}
.orc-tema{--bg:#0f1724;--bg2:#1a2332;--bg3:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--border:#2d3a4e;--input-bg:#1a2332;--input-border:#334155}
.orc-tema .cartao{background:#1a2332;border-color:#334155}
.orc-tema input,.orc-tema select{background:#1a2332;border-color:#334155;color:#e2e8f0}
.orc-nav{display:flex;gap:4px;margin-bottom:14px;background:var(--bg3);padding:4px;border-radius:8px}
.orc-nav span{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);font-weight:500}
.orc-nav span.ativo{background:var(--primaria);color:#fff}
.estq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.estq-item{background:var(--bg2);border:1px solid var(--borda);border-radius:8px;padding:12px}
.estq-item .nome{font-weight:600;font-size:13px;color:var(--text)}
.estq-item .info{font-size:11px;color:var(--text2);margin-top:3px}
.estq-item .qtd{font-size:18px;font-weight:700;margin-top:4px}
.estq-item .qtd.ok{color:var(--sucesso)}.estq-item .qtd.baixo{color:var(--aviso)}.estq-item .qtd.critico{color:var(--perigo)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:10px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:14px;padding:20px;width:540px;max-width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:14px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:14px}
.flut-direita{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2)}
.checkbox-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.checkbox-grid label{font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text)}
.link-cell{display:flex;align-items:center;gap:4px}.link-cell input{flex:1;min-width:80px}.link-cell a{font-size:13px;text-decoration:none;color:var(--primaria);white-space:nowrap}
.emp-info-box{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--text2);line-height:1.6}
.emp-info-box strong{color:var(--text)}
.kanban-board{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;min-height:calc(100vh - 300px);-webkit-overflow-scrolling:touch}
.kanban-col{flex:1;min-width:240px;background:var(--bg3);border-radius:10px;padding:10px;display:flex;flex-direction:column;max-height:calc(100vh - 270px)}
.kanban-col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px}
.kanban-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center}
.kanban-col-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.kanban-col-count{background:var(--bg2);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:var(--text2)}
.kanban-cards{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:60px;-webkit-overflow-scrolling:touch}
.kanban-card{background:var(--bg2);border-radius:8px;padding:12px;border:1px solid var(--borda);cursor:grab;transition:box-shadow .15s,transform .15s}
.kanban-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.15);transform:translateY(-1px)}
.kanban-card.dragging{opacity:.4;cursor:grabbing}
.kanban-card-title{font-weight:700;font-size:14px;margin-bottom:4px}
.kanban-card-info{font-size:11px;color:var(--text2);margin-bottom:4px}
.kanban-card-valor{font-size:16px;font-weight:700;color:var(--primaria);margin-bottom:2px}
.kanban-card-sub{font-size:11px;color:var(--text2)}
.kanban-card-anexos{font-size:10px;color:var(--text2);margin-top:6px;padding-top:6px;border-top:1px solid var(--borda)}
.kanban-dropzone{border:1px dashed var(--borda);border-radius:8px;text-align:center;padding:20px;color:var(--text2);font-size:12px}
.filtro-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:end;background:var(--bg2);padding:12px;border-radius:10px;border:1px solid var(--borda)}
.filtro-bar .grupo{min-width:110px}
.filtro-bar input,.filtro-bar select{padding:6px 10px;border:1px solid var(--input-border);border-radius:5px;background:var(--input-bg);color:var(--text);font-size:13px;outline:none;width:100%}
.filtro-bar input:focus,.filtro-bar select:focus{border-color:var(--primaria)}
.dash-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.dash-header h1{font-size:22px;font-weight:800}
.dash-header .sub{font-size:13px;color:var(--text2);margin-top:2px}
.dash-toggle{display:flex;gap:2px;background:var(--bg3);padding:3px;border-radius:8px}
.dash-toggle button{padding:5px 14px;border:none;border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600}
.dash-toggle button.ativo{background:var(--primaria);color:#fff}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.kpi-card{background:var(--bg2);border:1px solid var(--borda);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.kpi-card .kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:var(--text2)}
.kpi-card .kpi-value{font-size:22px;font-weight:800;margin-top:6px}
.kpi-card .kpi-growth{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:4px}
.kpi-card .kpi-growth.up{color:var(--sucesso)}
.kpi-card .kpi-growth.down{color:var(--perigo)}
.kpi-card .kpi-spark{position:absolute;bottom:0;right:0;width:70px;height:32px;opacity:.7}
.kpi-card.green{border-left:3px solid var(--sucesso)}
.kpi-card.orange{border-left:3px solid var(--aviso)}
.kpi-card.purple{border-left:3px solid #a855f7}
.kpi-card.blue{border-left:3px solid var(--primaria)}
.dash-main{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:14px}
.dash-chart-box{background:var(--bg2);border:1px solid var(--borda);border-radius:12px;padding:14px}
.dash-chart-box h3{font-size:14px;font-weight:700;margin-bottom:2px}
.dash-chart-box .desc{font-size:12px;color:var(--text2);margin-bottom:12px}
.dash-chart-legend{display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.dash-chart-legend span{font-size:11px;display:flex;align-items:center;gap:5px;color:var(--text2)}
.dash-chart-legend span::before{content:'';width:10px;height:10px;border-radius:50%}
.dash-chart-legend .lg-fat::before{background:#3b82f6}
.dash-chart-legend .lg-rec::before{background:#22c55e}
.dash-chart-legend .lg-desp::before{background:#ef4444}
.dash-chart-legend .lg-res::before{background:#a855f7}
.dash-chart-legend .lg-proj::before{background:#14b8a6}
.indicadores-box{background:var(--bg2);border:1px solid var(--borda);border-radius:12px;padding:14px}
.indicadores-box h3{font-size:14px;font-weight:700;margin-bottom:14px}
.ind-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--borda);gap:8px}
.ind-item:last-child{border-bottom:none}
.ind-item .ind-label{font-size:12px;color:var(--text2)}
.ind-item .ind-val{font-size:14px;font-weight:700}
.ind-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;margin-left:6px;white-space:nowrap}
.ind-tag.ok{background:rgba(34,197,94,.15);color:var(--sucesso)}
.ind-tag.medio{background:rgba(245,158,11,.15);color:var(--aviso)}
.ind-tag.baixo{background:rgba(239,68,68,.15);color:var(--perigo)}
.dash-bottom{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.dash-cat-box{background:var(--bg2);border:1px solid var(--borda);border-radius:12px;padding:14px}
.dash-cat-box h3{font-size:14px;font-weight:700;margin-bottom:12px}
.cat-bar-row{margin-bottom:10px}
.cat-bar-row .cat-info{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.cat-bar-row .cat-info .cat-nome{color:var(--text);font-weight:600}
.cat-bar-row .cat-info .cat-val{color:var(--text2)}
.cat-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.donut-center{position:relative;display:flex;align-items:center;justify-content:center}
.donut-center .donut-total{position:absolute;text-align:center}
.donut-center .donut-total .val{font-size:22px;font-weight:800}
.donut-center .donut-total .lbl{font-size:11px;color:var(--text2)}
.donut-legend{margin-top:12px}
.donut-legend .dl-item{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px}
.donut-legend .dl-dot{width:10px;height:10px;border-radius:50%}
.donut-legend .dl-pct{margin-left:auto;font-weight:700}
.sidebar-overlay{display:none;position:fixed;top:52px;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:49}
.sidebar-overlay.show{display:block}
@media(max-width:768px){
.btn-hamburger{display:block}
.sidebar{transform:translateX(-100%);box-shadow:2px 0 8px rgba(0,0,0,.3)}
.sidebar.open{transform:translateX(0)}
.conteudo{margin-left:0;padding:12px}
.topo-esq h2{max-width:140px;font-size:13px}
.cartoes{grid-template-columns:1fr 1fr}
.linha-graficos{grid-template-columns:1fr}
.form-grid,.form-grid-3,.form-grid-4{grid-template-columns:1fr}
.kpi-row{grid-template-columns:1fr 1fr}
.dash-main{grid-template-columns:1fr}
.dash-bottom{grid-template-columns:1fr}
.kanban-col{min-width:220px}
.filtro-bar{flex-direction:column;align-items:stretch}
.filtro-bar .grupo{min-width:auto}
.checkbox-grid{grid-template-columns:1fr 1fr}
.modal{padding:16px}
.kpi-card .kpi-value{font-size:18px}
.titulo-pag{font-size:18px}
.dash-header h1{font-size:18px}
}
</style>
</head>
<body>
<div id="telaLogin"><div class="login-box">
<div style="background:#2563eb;color:#fff;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin-bottom:10px">SF</div>
<h1>CRM SF</h1><p class="sub">Instalações Fotovoltaicas</p>
<label>Usuário</label><input type="text" id="loginUser">
<label>Senha</label><input type="password" id="loginPass" onkeydown="if(event.key=='Enter')logar()">
<div class="remember"><input type="checkbox" id="rememberMe"><label for="rememberMe">Lembrar login</label></div>
<button onclick="logar()">Entrar</button><div class="login-erro" id="loginErro"></div>
</div></div>
<div id="app">
<div class="topo"><div class="topo-esq"><button class="btn-hamburger" onclick="toggleSidebar()">☰</button><div class="logo">SF</div><h2>CRM SF Projetos Elétricos</h2></div><div class="topo-dir"><span id="userInfo" style="color:var(--header-txt);font-size:11px;margin-right:6px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span><button class="topo-btn" onclick="altTema()" id="btnTema">🌙</button><button class="topo-btn" onclick="sair()">Sair</button></div></div>
<div class="layout"><div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div><div class="sidebar" id="sidebar"></div><div class="conteudo" id="conteudo"></div></div></div>
<div class="modal-overlay" id="modalLead"><div class="modal">
<button class="flut-direita" onclick="fecharModalLead()">✕</button><h2 id="tituloModalLead">Novo Lead</h2>
<div class="form-grid">
<div class="grupo"><label>Nome *</label><input id="fLeadNome"></div><div class="grupo"><label>Telefone</label><input id="fLeadTel"></div>
<div class="grupo"><label>Cidade</label><input id="fLeadCidade"></div><div class="grupo"><label>Origem</label><select id="fLeadOrigem"><option>Indicação</option><option>Instagram</option><option>Facebook</option><option>Site</option><option>WhatsApp</option><option>Outro</option></select></div>
<div class="grupo"><label>Valor</label><input id="fLeadValor"></div><div class="grupo"><label>Vendedor</label><select id="fLeadVendedor"><option>João</option><option>Bruno</option><option>Vinicius</option><option>Sistema</option></select></div>
<div class="grupo" style="grid-column:1/3"><label>Link do Orçamento (pasta)</label><input id="fLeadLink" placeholder="https://drive.google.com/..." style="width:100%"></div>
<div class="grupo" style="grid-column:1/3"><label>Obs</label><input id="fLeadObs"></div></div>
<button class="btn btn-primary" onclick="salvarLeadModal()">Salvar</button></div></div>

function calcularValorPorPotencia(potStr){
  if(!potStr)return{valor:'R$ 0,00',trt:'R$ 70,00'};
  var pot=parseFloat(String(potStr).replace(/[kKwWpP]/g,'').replace(',','.'))||0;
  var valor='R$ 0,00',trt='R$ 70,00';
  if(pot>0&&pot<=7.5){valor='R$ 370,00';trt='R$ 70,00'}
  else if(pot>7.5&&pot<=20){valor='R$ 500,00';trt='R$ 70,00'}
  else if(pot>20&&pot<=75){valor='R$ 900,00';trt='R$ 70,00'}
  else if(pot>75){valor='R$ 900,00';trt='R$ 70,00'}
  return{valor:valor,trt:trt}
}

function tcAba(aba){
  abaToggle=aba;
  var btns=document.querySelectorAll('#barraToggle button');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('ativo');
  if(aba=='estoque'&&btns[0])btns[0].classList.add('ativo');
  if(aba=='leads'&&btns[1])btns[1].classList.add('ativo');
  if(aba=='vendas'&&btns[2])btns[2].classList.add('ativo');
  if(aba=='projetos'&&btns[3])btns[3].classList.add('ativo');
  if(aba=='orcamentos'&&btns[4])btns[4].classList.add('ativo');
  var sb=document.getElementById('subBarra');
  if(sb){
    if(aba=='leads'){sb.innerHTML='<button class="ativo" onclick="subTcAba(\'status\')">Status</button><button onclick="subTcAba(\'origem\')">Origem</button><button onclick="subTcAba(\'vendedor\')">Vendedor</button>';subLead='status'}
    else if(aba=='projetos'){sb.innerHTML='<button class="ativo" onclick="subTcAba(\'empresa\')">Empresa</button><button onclick="subTcAba(\'status\')">Status</button>';subProj='empresa'}
    else sb.innerHTML='';
  }
  renderToggleChart();
}
function subTcAba(tipo){
  var btns=document.querySelectorAll('#subBarra button');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('ativo');
  if(event&&event.target)event.target.classList.add('ativo');
  if(abaToggle=='leads')subLead=tipo;
  if(abaToggle=='projetos')subProj=tipo;
  renderToggleChart();
}

async function pagOrcamentos(){ORC_HIST=await get('orcamentos');document.getElementById('conteudo').innerHTML='<div class="titulo-pag">📋 Orçamentos</div><div class="orc-tema" style="background:#0f1724;border-radius:12px;padding:20px"><div class="orc-nav"><span class="ativo" onclick="navOrc(\'criar\')">💰 Criar</span><span onclick="navOrc(\'hist\')">📜 Histórico</span></div><div id="orcBody">'+htmlCriarOrc()+'</div></div>';setTimeout(function(){document.getElementById('orcId').value=gerarOrcId();carregarSelOrc()},100)}
function gerarOrcId(){var m=String(new Date().getMonth()+1).padStart(2,'0'),a=String(new Date().getFullYear()).slice(-2),pre=m+'/'+a+'/';var seq=[];(ORC_HIST.length?ORC_HIST:[]).forEach(function(o){if(o.id&&o.id.indexOf(pre)===0){var n=parseInt(o.id.split('/')[2]);if(!isNaN(n))seq.push(n)}});return pre+String((seq.length?Math.max.apply(null,seq):0)+1).padStart(3,'0')}
function htmlCriarOrc(){return '<div class="form-grid"><div class="grupo"><label>ID</label><input id="orcId" readonly style="font-weight:700"></div><div class="grupo"><label>Status</label><select id="orcStatus"><option>Aguardando Pedido</option><option>Aprovado</option><option>Cancelado</option><option>Em Negociação</option></select></div><div class="grupo"><label>Nome</label><input id="orcNome"></div><div class="grupo"><label>Tel</label><input id="orcTel"></div><div class="grupo"><label>Endereço</label><input id="orcEnd"></div><div class="grupo"><label>Título</label><input id="orcTit"></div><div class="grupo"><label>Validade</label><input id="orcVal"></div><div class="grupo"><label>Pagamento</label><input id="orcPag"></div><div class="grupo"><label>Vendedor</label><select id="orcVend"><option>João</option><option>Bruno</option><option>Vinicius</option><option>Sistema</option></select></div><div class="grupo"><label>Cidade</label><input id="orcCid"></div></div><div style="display:flex;gap:8px;align-items:end;margin-bottom:12px;flex-wrap:wrap"><div class="grupo" style="flex:2;min-width:150px"><label>Item</label><select id="orcSel"><option>Carregando...</option></select></div><div class="grupo"><label>Qtd</label><input type="number" id="orcQtd" value="1"></div><button class="btn btn-success" style="margin-bottom:4px" onclick="addItemOrc()">+</button></div><div class="tabela-wrap" style="margin-bottom:12px"><table><thead><tr><th>Item</th><th>Tipo</th><th>Marca</th><th>Qtd</th><th>Valor</th><th>Total</th><th>Ação</th></tr></thead><tbody id="orcItensBody"></tbody></table></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px"><div class="cartao"><div class="rotulo">Sub</div><div class="valor" id="orcSub" style="font-size:18px">R$ 0,00</div></div><div class="grupo"><label>Desc %</label><input type="number" id="orcDesc" value="0" oninput="calcOrc()"></div><div class="grupo"><label>Taxa</label><input type="number" id="orcTax" value="0" oninput="calcOrc()"></div><div class="cartao"><div class="rotulo">Total</div><div class="valor" id="orcTot" style="font-size:18px;color:var(--primaria)">R$ 0,00</div></div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-primary" onclick="salvarOrc()">💾 Salvar</button><button class="btn btn-success" onclick="pdfOrc()">📄 PDF</button><button class="btn btn-outline" onclick="novoOrc()">🆕 Novo</button></div><div id="orcMsg" style="margin-top:6px;font-size:13px;color:var(--sucesso)"></div>'}
async function carregarSelOrc(){var e=await get('estoque');var s=document.getElementById('orcSel');if(!s)return;s.innerHTML='<option value="">Selecione</option>';e.forEach(function(x){s.innerHTML+='<option value="'+x.id+'">'+x.item+' — R$ '+fmtNum(x.valor_venda)+(x.qtd>0?' ['+x.qtd+' '+x.un+']':'')+'</option>'});if(!e.length)s.innerHTML='<option value="">Estoque vazio</option>'}
function calcOrc(){var s=0;ORC_ITENS.forEach(function(i){s+=i.total});var d=parseFloat(document.getElementById('orcDesc').value)||0,tx=parseFloat(document.getElementById('orcTax').value)||0,t=s*(1-d/100)+tx;document.getElementById('orcSub').textContent='R$ '+fmtNum(s);document.getElementById('orcTot').textContent='R$ '+fmtNum(t);return{s,d,tx,t}}
async function novoOrc(){ORC_ITENS=[];['orcNome','orcTel','orcEnd','orcTit','orcVal','orcPag','orcCid'].forEach(function(c){try{document.getElementById(c).value=''}catch(e){}});document.getElementById('orcDesc').value='0';document.getElementById('orcTax').value='0';document.getElementById('orcId').value=gerarOrcId();calcOrc();document.getElementById('orcMsg').textContent='';document.getElementById('orcItensBody').innerHTML='';carregarSelOrc()}
async function addItemOrc(){var s=document.getElementById('orcSel');if(!s||!s.value)return;var q=parseInt(document.getElementById('orcQtd').value)||1;var {data}=await sb.from('estoque').select('*').eq('id',parseInt(s.value)).single();if(!data)return;ORC_ITENS.push({id:Date.now(),item:data.item,tipo:data.tipo,marca:data.marca||'',qtd:q,valor:data.valor_venda||0,total:q*(data.valor_venda||0)});renderItensOrc();calcOrc()}
function renderItensOrc(){var tb=document.getElementById('orcItensBody');if(!tb)return;tb.innerHTML='';ORC_ITENS.forEach(function(it){tb.innerHTML+='<tr><td>'+it.item+'</td><td>'+it.tipo+'</td><td>'+(it.marca||'')+'</td><td>'+it.qtd+'</td><td>R$ '+fmtNum(it.valor)+'</td><td>R$ '+fmtNum(it.total)+'</td><td><button class="btn-icone" onclick="remItemOrc('+it.id+')">❌</button></td></tr>'})}
function remItemOrc(id){ORC_ITENS=ORC_ITENS.filter(function(i){return i.id!=id});renderItensOrc();calcOrc()}
async function salvarOrc(){var nome=document.getElementById('orcNome').value.trim();if(!nome){document.getElementById('orcMsg').textContent='Informe o nome';return}var cal=calcOrc(),id=document.getElementById('orcId').value||gerarOrcId();await ins('orcamentos',{id:id,nome:nome,tel:document.getElementById('orcTel').value,endereco:document.getElementById('orcEnd').value,titulo:document.getElementById('orcTit').value,validade:document.getElementById('orcVal').value,pagamento:document.getElementById('orcPag').value,vendedor:document.getElementById('orcVend').value,cidade:document.getElementById('orcCid').value,status:document.getElementById('orcStatus').value,itens:JSON.parse(JSON.stringify(ORC_ITENS)),subtotal:cal.s,desconto:cal.d,taxa:cal.tx,total:cal.t,data:hoje()});var L=await get('leads');if(!L.find(function(x){return x.nome==nome})){await ins('leads',{nome:nome,cidade:document.getElementById('orcCid').value||'',origem:'Orçamento',valor:'R$ '+fmtNum(cal.t),contato:document.getElementById('orcTel').value,data:hoje(),andamento:'Orçamento Gerado',vendedor:document.getElementById('orcVend').value||'Sistema'})}for(var i=0;i<ORC_ITENS.length;i++){var E=await get('estoque');var ee=E.find(function(x){return x.item.toLowerCase()==ORC_ITENS[i].item.toLowerCase()});if(ee)await upd('estoque',ee.id,{qtd:Math.max(0,ee.qtd-ORC_ITENS[i].qtd)})}document.getElementById('orcMsg').textContent='✅ Salvo!';ORC_HIST.unshift({id:id,nome:nome,total:cal.t,status:document.getElementById('orcStatus').value,data:hoje()});novoOrc()}
function pdfOrc(){var nome=document.getElementById('orcNome').value.trim()||'Cliente',cal=calcOrc();try{var doc=new jspdf.jsPDF();doc.setFontSize(16);doc.text('SF Projetos Elétricos',14,22);doc.setFontSize(10);doc.text('Orçamento: '+document.getElementById('orcId').value,14,32);doc.text('Cliente: '+nome,14,42);doc.text('Data: '+hoje(),14,50);var d=[['Item','Qtd','V.Unit','Total']];ORC_ITENS.forEach(function(i){d.push([i.item,String(i.qtd),'R$ '+fmtNum(i.valor),'R$ '+fmtNum(i.total)])});if(doc.autoTable){doc.autoTable({startY:58,head:[d[0]],body:d.slice(1),theme:'striped',headStyles:{fillColor:[37,99,235]}});var y=doc.lastAutoTable.finalY+10;doc.text('Total: R$ '+fmtNum(cal.t),160,y)}doc.save('orcamento_'+nome.replace(/\s/g,'_')+'.pdf')}catch(e){alert('Erro PDF: '+e.message)}}
function navOrc(pg){document.getElementById('orcBody').innerHTML=pg=='criar'?htmlCriarOrc():htmlHistOrc();document.querySelectorAll('.orc-nav span').forEach(function(e){e.classList.toggle('ativo',e.textContent.includes(pg=='criar'?'💰':'📜'))});if(pg=='criar'){carregarSelOrc();document.getElementById('orcId').value=gerarOrcId()}if(pg=='hist')carregarHist()}
function htmlHistOrc(){return '<div class="filtro-bar"><div class="grupo"><label>Status</label><select id="fOrcSts" onchange="filtrarOrcHist()"><option value="">Todos</option><option>Aguardando Pedido</option><option>Aprovado</option><option>Cancelado</option><option>Em Negociação</option></select></div></div><div class="tabela-wrap"><table><thead><tr><th>ID</th><th>Cliente</th><th>Status</th><th>Total</th><th>Data</th><th>Ações</th></tr></thead><tbody id="orcHistBody"></tbody></table></div>'}
async function carregarHist(){var d=await get('orcamentos');_allOrcamentos=d;filtrarOrcHist()}
function filtrarOrcHist(){
  var st=document.getElementById('fOrcSts')?document.getElementById('fOrcSts').value:'';
  var d=_allOrcamentos||[];
  if(st)d=d.filter(function(o){return o.status==st});
  var tb=document.getElementById('orcHistBody');if(!tb)return;tb.innerHTML='';if(!d.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:30px">Nenhum</td></tr>';return}
  d.forEach(function(o){tb.innerHTML+='<tr><td><strong>'+o.id+'</strong></td><td>'+o.nome+'</td><td><select class="edita-select" style="width:140px" onchange="altStatusOrc(\''+o.id+'\',this.value)"><option value="Aguardando Pedido"'+(o.status=='Aguardando Pedido'?' selected':'')+'>Aguardando</option><option value="Aprovado"'+(o.status=='Aprovado'?' selected':'')+'>Aprovado</option><option value="Cancelado"'+(o.status=='Cancelado'?' selected':'')+'>Cancelado</option><option value="Em Negociação"'+(o.status=='Em Negociação'?' selected':'')+'>Em Negoc.</option></select></td><td>R$ '+fmtNum(o.total)+'</td><td>'+(o.data||'')+'</td><td><button class="btn-icone" onclick="reprintOrc(\''+o.id+'\',\''+o.nome+'\','+o.total+')">🔄 PDF</button><button class="btn-icone" onclick="delOrcHist(\''+o.id+'\')">🗑️</button></td></tr>'});
}
async function altStatusOrc(id,v){await sb.from('orcamentos').update({status:v}).eq('id',id);_allOrcamentos=null}
function reprintOrc(id,nome,total){try{var doc=new jspdf.jsPDF();doc.setFontSize(16);doc.text('SF Projetos Elétricos',14,22);doc.setFontSize(12);doc.text('Orçamento: '+id,14,32);doc.text('Cliente: '+nome,14,42);doc.text('Valor: R$ '+fmtNum(total),14,52);doc.text('Emitido: '+hoje(),14,62);doc.save('orcamento_'+nome.replace(/\s/g,'_')+'.pdf')}catch(e){alert('Erro: '+e.message)}}
async function delOrcHist(id){if(!confirm('Excluir?'))return;await sb.from('orcamentos').delete().eq('id',id);await pagOrcamentos()}
// ESTOQUE
async function pagEstoque(){
  var d=await get('estoque');_allEstoque=d;
  var ct=d.reduce(function(s,e){return s+e.qtd*e.valor_pago},0),vt=d.reduce(function(s,e){return s+e.qtd*e.valor_venda},0);
  var h='<div class="titulo-pag">📦 Estoque</div>'+
    '<div class="filtro-bar">'+
    '<div class="grupo"><label>Busca</label><input id="fEstqBusca" placeholder="Item..." oninput="filtrarEstoque()"></div>'+
    '<div class="grupo"><label>Nível</label><select id="fEstqNivel" onchange="filtrarEstoque()"><option value="">Todos</option><option value="critico">Crítico (≤3)</option><option value="baixo">Baixo (≤10)</option><option value="ok">OK (>10)</option></select></div>'+
    '<button class="btn btn-outline" onclick="limparFiltrosEstoque()">Limpar</button></div>'+
    '<p style="margin-bottom:12px" id="estqCount">'+d.length+' itens • Custo: R$ '+fmtNum(ct)+' • Venda: R$ '+fmtNum(vt)+'</p>'+
    '<button class="btn btn-success" onclick="abrirModalEstq()" style="margin-bottom:12px">+ Novo</button>'+
    '<div class="estq-grid" id="estqGrid"></div>'+
    '<div class="tabela-wrap"><table><thead><tr><th>Item</th><th>Tipo</th><th>Marca</th><th>Qtd</th><th>Un</th><th>Vlr Pago</th><th>Vlr Venda</th><th>Total</th><th>Fornec</th><th>Ações</th></tr></thead><tbody id="estqBody"></tbody></table></div>';
  document.getElementById('conteudo').innerHTML=h;
  filtrarEstoque();
}
function limparFiltrosEstoque(){
  if(document.getElementById('fEstqBusca'))document.getElementById('fEstqBusca').value='';
  if(document.getElementById('fEstqNivel'))document.getElementById('fEstqNivel').value='';
  filtrarEstoque();
}
function filtrarEstoque(){
  var b=(document.getElementById('fEstqBusca')?document.getElementById('fEstqBusca').value:'').toLowerCase();
  var nv=document.getElementById('fEstqNivel')?document.getElementById('fEstqNivel').value:'';
  var d=_allEstoque;
  if(b)d=d.filter(function(e){return(e.item||'').toLowerCase().includes(b)||(e.marca||'').toLowerCase().includes(b)||(e.tipo||'').toLowerCase().includes(b)});
  if(nv)d=d.filter(function(e){if(nv=='critico')return e.qtd<=3;if(nv=='baixo')return e.qtd>3&&e.qtd<=10;if(nv=='ok')return e.qtd>10;return true});
  var ct=d.reduce(function(s,e){return s+e.qtd*e.valor_pago},0),vt=d.reduce(function(s,e){return s+e.qtd*e.valor_venda},0);
  document.getElementById('estqCount').textContent=d.length+' itens • Custo: R$ '+fmtNum(ct)+' • Venda: R$ '+fmtNum(vt);
  var gh='';
  d.forEach(function(e){var c=e.qtd<=3?'critico':e.qtd<=10?'baixo':'ok';gh+='<div class="estq-item"><div class="nome">'+e.item+'</div><div class="info">'+(e.marca?e.marca+' ':'')+e.tipo+'</div><div class="qtd '+c+'">'+e.qtd+' <span style="font-size:12px;color:var(--text2)">'+e.un+'</span></div></div>'});
  document.getElementById('estqGrid').innerHTML=gh;
  var bh='';
  d.forEach(function(e){bh+='<tr><td>'+e.item+'</td><td>'+(e.tipo||'')+'</td><td>'+(e.marca||'')+'</td><td style="font-weight:600;color:'+(e.qtd<=3?'var(--perigo)':e.qtd<=10?'var(--aviso)':'var(--sucesso)')+'">'+e.qtd+'</td><td>'+e.un+'</td><td>R$ '+fmtNum(e.valor_pago)+'</td><td>R$ '+fmtNum(e.valor_venda)+'</td><td>R$ '+fmtNum(e.qtd*e.valor_venda)+'</td><td>'+(e.fornec||'')+'</td><td><button class="btn-icone" onclick="editEstq('+e.id+')">✏️</button><button class="btn-icone" onclick="delEstq('+e.id+')">🗑️</button></td></tr>'});
  if(!d.length)bh='<tr><td colspan="10" style="text-align:center;padding:30px">Nenhum item encontrado</td></tr>';
  document.getElementById('estqBody').innerHTML=bh;
}
function abrirModalEstq(item){idEditEstq=item?item.id:null;document.getElementById('estqItem').value=item?item.item:'';document.getElementById('estqTipo').value=item?item.tipo:'';document.getElementById('estqMarca').value=item?item.marca:'';document.getElementById('estqQtd').value=item?item.qtd:0;document.getElementById('estqUn').value=item?item.un:'un';document.getElementById('estqPago').value=item?item.valor_pago:'';document.getElementById('estqVenda').value=item?item.valor_venda:'';document.getElementById('estqFornec').value=item?item.fornec:'';document.getElementById('modalEstoque').classList.add('show')}
function fecharModalEstoque(){document.getElementById('modalEstoque').classList.remove('show')}
async function salvarEstoque(){var item=document.getElementById('estqItem').value.trim(),tipo=document.getElementById('estqTipo').value.trim(),marca=document.getElementById('estqMarca').value.trim(),qtd=parseInt(document.getElementById('estqQtd').value)||0,un=document.getElementById('estqUn').value,vp=parseFloat(document.getElementById('estqPago').value)||0,vv=parseFloat(document.getElementById('estqVenda').value)||0,fornec=document.getElementById('estqFornec').value.trim();if(!item){alert('Nome obrigatório');return}if(idEditEstq){await upd('estoque',idEditEstq,{item,tipo,marca,qtd,un,valor_pago:vp,valor_venda:vv,fornec})}else{await ins('estoque',{item,tipo,marca,qtd,un,valor_pago:vp,valor_venda:vv,fornec})}fecharModalEstoque();pagEstoque()}
async function editEstq(id){var d=await get('estoque');var e=d.find(function(x){return x.id==id});if(e)abrirModalEstq(e)}
async function delEstq(id){if(!confirm('Excluir?'))return;await del('estoque',id);pagEstoque()}
// CONFIG
async function pagConfig(){
  if(usuarioAtual.funcao!='Administrador'){document.getElementById('conteudo').innerHTML='<div class="titulo-pag">⚙️ Config</div><p>Acesso restrito</p>';return}
  var u=await get('usuarios');var pj=await get('projetos');var el=[];pj.forEach(function(p){if(p.empresa&&el.indexOf(p.empresa)==-1)el.push(p.empresa)});
  var h='<div class="titulo-pag">⚙️ Config</div><div style="background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:16px;margin-bottom:14px"><h3 style="font-size:14px;font-weight:600;margin-bottom:10px">💾 Backup</h3><p style="font-size:13px;color:var(--text2);margin-bottom:10px">Gere um arquivo Excel com todos os dados do sistema.</p><button class="btn btn-success" onclick="fazerBackup()">📥 Exportar Excel</button><div id="bkMsg" style="margin-top:6px;font-size:13px"></div></div><div style="background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:16px;margin-bottom:14px"><h3 style="font-size:14px;font-weight:600;margin-bottom:10px">👤 Novo Usuário</h3><div class="form-grid-4"><div class="grupo"><label>Nome</label><input id="cNome"></div><div class="grupo"><label>Usuário</label><input id="cUser"></div><div class="grupo"><label>Senha</label><input type="password" id="cPass"></div><div class="grupo"><label>Função</label><select id="cFun" onchange="document.getElementById(\'cEmpresaGroup\').style.display=this.value==\'Empresa\'?\'block\':\'none\'"><option>Vendedor</option><option>Administrador</option><option>Financeiro</option><option>Empresa</option></select></div><div class="grupo" id="cEmpresaGroup" style="display:none"><label>Empresa</label><input id="cEmpresa" list="cEmpresaList"><datalist id="cEmpresaList"></datalist></div></div><button class="btn btn-primary" onclick="addUser()" style="margin-top:6px">+ Cadastrar</button><div id="cMsg" style="margin-top:6px;color:var(--sucesso);font-size:13px"></div></div><div style="background:var(--bg2);border:1px solid var(--borda);border-radius:10px;padding:16px"><h3 style="font-size:14px;font-weight:600;margin-bottom:10px">👥 Cadastrados</h3><div class="tabela-wrap"><table><thead><tr><th>Nome</th><th>Usuário</th><th>Função</th><th>Empresa</th><th>Ação</th></tr></thead><tbody>';
  u.forEach(function(x,i){h+='<tr><td>'+x.nome+'</td><td>'+x.usuario+'</td><td>'+(x.funcao||'')+'</td><td>'+(x.empresa||'—')+'</td><td>'+(i>0?'<button class="btn-icone" onclick="rmUser('+x.id+')">🗑️</button>':' —')+'</td></tr>'});
  h+='</tbody></table></div></div>';document.getElementById('conteudo').innerHTML=h;
  var dl=document.getElementById('cEmpresaList');if(dl){dl.innerHTML='';el.forEach(function(e){dl.innerHTML+='<option value="'+e+'">'})}
}
async function fazerBackup(){var msg=document.getElementById('bkMsg');if(!msg)return;msg.textContent='Gerando backup...';msg.style.color='var(--aviso)';try{var wb=XLSX.utils.book_new();var tabelas=['leads','vendas','gastos','empresas','projetos','estoque','orcamentos','usuarios'];for(var i=0;i<tabelas.length;i++){var data=await get(tabelas[i]);if(tabelas[i]==='projetos'){data=data.map(function(p){var c=Object.assign({},p);if(c.documentos){try{c.documentos=JSON.parse(c.documentos).map(function(d){return d.nome}).join('; ')}catch(e){}}if(c.fotos){try{c.fotos=JSON.parse(c.fotos).length+' foto(s)'}catch(e){}}return c})}if(tabelas[i]==='orcamentos'){data=data.map(function(o){var c=Object.assign({},o);if(c.itens){try{c.itens=JSON.stringify(c.itens)}catch(e){}}return c})}var ws=XLSX.utils.json_to_sheet(data.length?data:[{aviso:'Sem dados'}]);XLSX.utils.book_append_sheet(wb,ws,tabelas[i])}XLSX.writeFile(wb,'backup_crm_'+hoje().replace(/\//g,'-')+'.xlsx');msg.textContent='✅ Backup gerado!';msg.style.color='var(--sucesso)'}catch(e){msg.textContent='Erro: '+e.message;msg.style.color='var(--perigo)'}}
async function addUser(){var n=document.getElementById('cNome').value.trim(),u=document.getElementById('cUser').value.trim(),p=document.getElementById('cPass').value.trim(),f=document.getElementById('cFun').value,emp=document.getElementById('cEmpresa').value.trim();if(!n||!u||!p){document.getElementById('cMsg').textContent='Preencha todos';return}if(f=='Empresa'&&!emp){document.getElementById('cMsg').textContent='Informe a empresa';return}var ex=await get('usuarios');if(ex.find(function(x){return x.usuario==u})){document.getElementById('cMsg').textContent='Usuário já existe';return}await ins('usuarios',{nome:n,usuario:u,senha:p,funcao:f,empresa:emp});document.getElementById('cMsg').textContent='Cadastrado!';document.getElementById('cNome').value='';document.getElementById('cUser').value='';document.getElementById('cPass').value='';document.getElementById('cEmpresa').value='';pagConfig()}
async function rmUser(id){if(!confirm('Remover?'))return;await del('usuarios',id);pagConfig()}
document.addEventListener('DOMContentLoaded',function(){if(localStorage.getItem('tema')=='dark'){document.body.classList.add('dark');document.getElementById('btnTema').textContent='☀️'}autoLogin()});
</script>
</body>
